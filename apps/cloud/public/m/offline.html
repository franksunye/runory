<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7c5cfc" />
  <title>Offline — Runory Field</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .card {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      border-radius: 18px;
      background: linear-gradient(135deg, #7c5cfc, #6d4df5);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(124, 92, 252, 0.25);
    }
    .icon span {
      font-size: 36px;
      font-weight: 900;
      color: #ffffff;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      min-height: 48px;
      width: 100%;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      color: #334155;
      font-size: 14px;
      font-weight: 600;
      border-radius: 12px;
      padding: 12px 24px;
      cursor: pointer;
    }
    button:active { background: #f1f5f9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><span>R</span></div>
    <h1>You are offline</h1>
    <p>
      Runory Field needs an internet connection to load your work.
      Please check your connection and try again.
    </p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
