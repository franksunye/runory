id: runory.deal
name: Deal Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company

objects:
  - key: deal
    label: Deal
    fields:
      - key: name
        label: Deal Name
        type: text
        ownership: module_owned
        required: true
      - key: stage
        label: Stage
        type: select
        ownership: module_owned
        required: true
        default_value: "new"
        validation:
          options: ["new", "qualified", "proposal", "negotiation", "won", "lost"]
      - key: amount
        label: Amount
        type: number
        ownership: module_owned
      - key: currency
        label: Currency
        type: text
        ownership: module_owned
        default_value: "CNY"
      - key: expected_close_date
        label: Expected Close Date
        type: date
        ownership: module_owned
      - key: probability
        label: Win Probability
        type: number
        ownership: module_owned
      - key: company_id
        label: Related Company
        type: text
        ownership: module_owned
      - key: primary_contact_id
        label: Primary Contact
        type: text
        ownership: module_owned
      - key: owner
        label: Owner
        type: user
        ownership: module_owned
      - key: source
        label: Source
        type: text
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: deal
    key: deal_list
    type: list
    label: Deal List
    config:
      columns:
        - field: name
          label: Deal Name
        - field: stage
          label: Stage
        - field: amount
          label: Amount
        - field: expected_close_date
          label: Expected Close
        - field: owner
          label: Owner
      actions:
        - create
        - view
      pageSize: 20

  - object: deal
    key: deal_form
    type: form
    label: Deal Form
    config:
      sections:
        - title: Basic Info
          fields:
            - field: name
              required: true
            - field: stage
              required: true
            - field: amount
            - field: currency
        - title: Related Info
          fields:
            - field: company_id
            - field: primary_contact_id
        - title: Follow-up Info
          fields:
            - field: expected_close_date
            - field: probability
            - field: owner
            - field: source
            - field: notes

permissions:
  - deal.read
  - deal.create
  - deal.update
  - deal.delete

relations:
  - object: deal
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: Related Company
  - object: deal
    targetObject: contact
    targetModule: runory.contact
    type: many_to_one
    foreignKey: primary_contact_id
    label: Primary Contact

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

presentation:
  visibility: top_level
  surface: customers
  audience: [sales_representative, sales_manager]

ui:
  navigation:
    - label: Deal
      route: /deals
      icon: target
      sortOrder: 25

extensionPoints:
  entities:
    - entity: deal
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 30
        reservedKeys: [id, name, stage, amount, currency, expected_close_date, probability, company_id, primary_contact_id, owner, source, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: deal_list
      slots:
        - id: deal.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: deal_form
      slots:
        - id: deal.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: open_deals_metric
      type: metric_card
      label: Open Deals
      icon: target
      tone: blue
      data:
        kind: count
        object: deal
        where: "stage not in ('won', 'lost')"
      sub:
        kind: count
        object: deal
        where: "stage = 'won'"
        template: "Won: {count}"
      link: /deals

    - key: deal_stage_breakdown
      type: breakdown
      label: Deal Stage Distribution
      icon: pie-chart
      tone: blue
      data:
        kind: group_count
        object: deal
        groupBy: stage

    - key: open_deals_list
      type: list
      label: Open Deals
      icon: target
      tone: blue
      data:
        kind: recent
        object: deal
        where: "stage not in ('won', 'lost')"
        orderBy: "expected_close_date asc"
        limit: 8
        columns: [name, stage, amount, expected_close_date, owner]
      link: /deals
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

    - key: new_deals_trend
      type: trend_chart
      label: New Deals Trend
      icon: trending-up
      tone: blue
      data:
        kind: timeseries
        object: deal
        range: 14d
      configurable:
        - path: data.range
          label: Time Range
          type: select
          options: ["7d", "14d", "30d"]

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
