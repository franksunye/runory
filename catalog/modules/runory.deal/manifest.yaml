id: runory.deal
name: Deal Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company

objects:
  - key: deal
    label: Deal
    fields:
      - key: name
        label: 商机名称
        type: text
        ownership: module_owned
        required: true
      - key: stage
        label: 阶段
        type: select
        ownership: module_owned
        required: true
        default_value: "new"
        validation:
          options: ["new", "qualified", "proposal", "negotiation", "won", "lost"]
      - key: amount
        label: 金额
        type: number
        ownership: module_owned
      - key: currency
        label: 币种
        type: text
        ownership: module_owned
        default_value: "CNY"
      - key: expected_close_date
        label: 预计成交日期
        type: date
        ownership: module_owned
      - key: probability
        label: 成交概率
        type: number
        ownership: module_owned
      - key: company_id
        label: 关联公司
        type: text
        ownership: module_owned
      - key: primary_contact_id
        label: 主要联系人
        type: text
        ownership: module_owned
      - key: owner
        label: 负责人
        type: text
        ownership: module_owned
      - key: source
        label: 来源
        type: text
        ownership: module_owned
      - key: notes
        label: 备注
        type: text
        ownership: module_owned

views:
  - object: deal
    key: deal_list
    type: list
    label: 商机列表
    config:
      columns:
        - field: name
          label: 商机名称
        - field: stage
          label: 阶段
        - field: amount
          label: 金额
        - field: expected_close_date
          label: 预计成交
        - field: owner
          label: 负责人
      actions:
        - create
        - view
      pageSize: 20

  - object: deal
    key: deal_form
    type: form
    label: 商机表单
    config:
      sections:
        - title: 基本信息
          fields:
            - field: name
              required: true
            - field: stage
              required: true
            - field: amount
            - field: currency
        - title: 关联信息
          fields:
            - field: company_id
            - field: primary_contact_id
        - title: 跟进信息
          fields:
            - field: expected_close_date
            - field: probability
            - field: owner
            - field: source
            - field: notes

permissions:
  - deal.read
  - deal.create
  - deal.update
  - deal.delete

relations:
  - object: deal
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: 关联公司
  - object: deal
    targetObject: contact
    targetModule: runory.contact
    type: many_to_one
    foreignKey: primary_contact_id
    label: 主要联系人

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: 商机
      route: /deals
      icon: target
      sortOrder: 25

extensionPoints:
  entities:
    - entity: deal
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 30
        reservedKeys: [id, name, stage, amount, currency, expected_close_date, probability, company_id, primary_contact_id, owner, source, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: deal_list
      slots:
        - id: deal.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: deal_form
      slots:
        - id: deal.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: open_deals_metric
      type: metric_card
      label: 待处理商机
      icon: target
      tone: blue
      data:
        kind: count
        object: deal
        where: "stage not in ('won', 'lost')"
      sub:
        kind: count
        object: deal
        where: "stage = 'won'"
        template: "已赢单 {count} 个"
      link: /deals

    - key: deal_stage_breakdown
      type: breakdown
      label: 商机阶段分布
      icon: pie-chart
      tone: blue
      data:
        kind: group_count
        object: deal
        groupBy: stage

    - key: open_deals_list
      type: list
      label: 待处理商机
      icon: target
      tone: blue
      data:
        kind: recent
        object: deal
        where: "stage not in ('won', 'lost')"
        orderBy: "expected_close_date asc"
        limit: 8
        columns: [name, stage, amount, expected_close_date, owner]
      link: /deals
      configurable:
        - path: data.limit
          label: 显示条数
          type: number
          min: 1
          max: 20

    - key: new_deals_trend
      type: trend_chart
      label: 商机新增趋势
      icon: trending-up
      tone: blue
      data:
        kind: timeseries
        object: deal
        range: 14d
      configurable:
        - path: data.range
          label: 时间范围
          type: select
          options: ["7d", "14d", "30d"]

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
