id: runory.service-site
name: Service Site Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company

objects:
  - key: service_site
    label: Service Site
    fields:
      - key: name
        label: Site Name
        type: text
        ownership: module_owned
        required: true
      - key: company_id
        label: Related Company
        type: text
        ownership: module_owned
      - key: primary_contact_id
        label: Primary Contact
        type: text
        ownership: module_owned
      - key: address
        label: Address
        type: text
        ownership: module_owned
        required: true
      - key: city
        label: City
        type: text
        ownership: module_owned
      - key: region
        label: Region
        type: text
        ownership: module_owned
      - key: postal_code
        label: Postal Code
        type: text
        ownership: module_owned
      - key: access_notes
        label: Access Notes
        type: text
        ownership: module_owned
      - key: service_notes
        label: Service Notes
        type: text
        ownership: module_owned
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "active"
        validation:
          options: ["active", "inactive"]

views:
  - object: service_site
    key: service_site_list
    type: list
    label: Service Site List
    config:
      columns:
        - field: name
          label: Site Name
        - field: address
          label: Address
        - field: city
          label: City
        - field: status
          label: Status
      actions:
        - create
        - view
      pageSize: 20

  - object: service_site
    key: service_site_form
    type: form
    label: Service Site Form
    config:
      sections:
        - title: Basic Info
          fields:
            - field: name
              required: true
            - field: address
              required: true
            - field: city
            - field: region
            - field: postal_code
        - title: Related Info
          fields:
            - field: company_id
            - field: primary_contact_id
        - title: Service Info
          fields:
            - field: access_notes
            - field: service_notes
            - field: status
              required: true

permissions:
  - service_site.read
  - service_site.create
  - service_site.update
  - service_site.delete

# ── Cross-Pack Relations (v0.2.4) ──
# service_site references objects owned by shared modules.
relations:
  - object: service_site
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: Related Company
  - object: service_site
    targetObject: contact
    targetModule: runory.contact
    type: many_to_one
    foreignKey: primary_contact_id
    label: Primary Contact

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

presentation:
  visibility: management
  surface: work_orders
  audience: [dispatcher]

ui:
  navigation:
    - label: Service Site
      route: /service-sites
      icon: map-pin
      sortOrder: 40

extensionPoints:
  entities:
    - entity: service_site
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 30
        reservedKeys: [id, name, company_id, primary_contact_id, address, city, region, postal_code, access_notes, service_notes, status, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: service_site_list
      slots:
        - id: service_site.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: service_site_form
      slots:
        - id: service_site.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: active_service_sites_metric
      type: metric_card
      label: Active Service Sites
      icon: map-pin
      tone: cyan
      data:
        kind: count
        object: service_site
        where: "status = 'active'"
      link: /service-sites

    - key: service_site_status_breakdown
      type: breakdown
      label: Service Site Status Distribution
      icon: pie-chart
      tone: cyan
      data:
        kind: group_count
        object: service_site
        groupBy: status

    - key: recent_service_sites_list
      type: list
      label: Recent Service Sites
      icon: map-pin
      tone: cyan
      data:
        kind: recent
        object: service_site
        orderBy: "created_at desc"
        limit: 5
        columns: [name, address, city, status]
      link: /service-sites
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
