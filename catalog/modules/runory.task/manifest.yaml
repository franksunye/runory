id: runory.task
name: Task Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: task
    label: Task
    fields:
      - key: title
        label: 任务标题
        type: text
        ownership: module_owned
        required: true
      - key: description
        label: 描述
        type: text
        ownership: module_owned
      - key: status
        label: 状态
        type: select
        ownership: module_owned
        required: true
        default_value: "todo"
        validation:
          options: ["todo", "in_progress", "done", "cancelled"]
      - key: priority
        label: 优先级
        type: select
        ownership: module_owned
        default_value: "medium"
        validation:
          options: ["low", "medium", "high", "urgent"]
      - key: due_date
        label: 截止日期
        type: date
        ownership: module_owned
      - key: assignee
        label: 负责人
        type: text
        ownership: module_owned
      - key: customer_id
        label: 关联客户
        type: text
        ownership: module_owned

views:
  - object: task
    key: task_list
    type: list
    label: 任务列表
    config:
      columns:
        - field: title
          label: 任务标题
        - field: status
          label: 状态
        - field: priority
          label: 优先级
        - field: due_date
          label: 截止日期
        - field: assignee
          label: 负责人
      actions:
        - create
        - view
      pageSize: 20

  - object: task
    key: task_form
    type: form
    label: 任务表单
    config:
      sections:
        - title: 基本信息
          fields:
            - field: title
              required: true
            - field: description
            - field: status
              required: true
            - field: priority
        - title: 关联信息
          fields:
            - field: due_date
            - field: assignee
            - field: customer_id

permissions:
  - task.read
  - task.create
  - task.update
  - task.delete

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: 任务
      route: /tasks
      icon: check-square
      sortOrder: 30

extensionPoints:
  entities:
    - entity: task
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 30
        reservedKeys: [id, title, description, status, priority, due_date, assignee, customer_id, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: task_list
      slots:
        - id: task.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: task_form
      slots:
        - id: task.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
