id: runory.task
name: Task Management
version: 2.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: task
    label: Task
    fields:
      - key: title
        label: 任务标题
        type: text
        ownership: module_owned
        required: true
      - key: description
        label: 描述
        type: text
        ownership: module_owned
      - key: status
        label: 状态
        type: select
        ownership: module_owned
        required: true
        default_value: "todo"
        validation:
          options: ["todo", "in_progress", "done", "cancelled"]
      - key: priority
        label: 优先级
        type: select
        ownership: module_owned
        default_value: "medium"
        validation:
          options: ["low", "medium", "high", "urgent"]
      - key: due_date
        label: 截止日期
        type: date
        ownership: module_owned
      - key: assignee
        label: 负责人
        type: text
        ownership: module_owned
      - key: company_id
        label: 关联公司
        type: text
        ownership: module_owned
      - key: contact_id
        label: 关联联系人
        type: text
        ownership: module_owned
      - key: deal_id
        label: 关联商机
        type: text
        ownership: module_owned

views:
  - object: task
    key: task_list
    type: list
    label: 任务列表
    config:
      columns:
        - field: title
          label: 任务标题
        - field: status
          label: 状态
        - field: priority
          label: 优先级
        - field: due_date
          label: 截止日期
        - field: assignee
          label: 负责人
      actions:
        - create
        - view
      pageSize: 20

  - object: task
    key: task_form
    type: form
    label: 任务表单
    config:
      sections:
        - title: 基本信息
          fields:
            - field: title
              required: true
            - field: description
            - field: status
              required: true
            - field: priority
        - title: 关联信息
          fields:
            - field: due_date
            - field: assignee
            - field: company_id
            - field: contact_id
            - field: deal_id

permissions:
  - task.read
  - task.create
  - task.update
  - task.delete

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: 任务
      route: /tasks
      icon: check-square
      sortOrder: 30

extensionPoints:
  entities:
    - entity: task
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 30
        reservedKeys: [id, title, description, status, priority, due_date, assignee, company_id, contact_id, deal_id, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: task_list
      slots:
        - id: task.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: task_form
      slots:
        - id: task.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: open_tasks_metric
      type: metric_card
      label: 待办任务
      icon: list-checks
      tone: amber
      data:
        kind: count
        object: task
        where: "status in ('todo', 'in_progress')"
      sub:
        kind: count
        object: task
        where: "status in ('todo', 'in_progress') and due_date < today"
        template: "{count} 个已逾期"
      link: /tasks

    - key: done_tasks_metric
      type: metric_card
      label: 已完成任务
      icon: check-circle
      tone: green
      data:
        kind: count
        object: task
        where: "status = 'done'"
      link: /tasks

    - key: task_status_breakdown
      type: breakdown
      label: 任务状态分布
      icon: pie-chart
      tone: slate
      data:
        kind: group_count
        object: task
        groupBy: status
      configurable:
        - path: data.groupBy
          label: 分组字段
          type: select
          options: [status, priority, assignee]

    - key: open_tasks_list
      type: list
      label: 待办任务
      icon: check-square
      tone: amber
      data:
        kind: recent
        object: task
        where: "status in ('todo', 'in_progress')"
        orderBy: "priority desc, due_date asc"
        limit: 8
        columns: [title, status, priority, due_date, assignee]
      link: /tasks
      configurable:
        - path: data.limit
          label: 显示条数
          type: number
          min: 1
          max: 20

    - key: new_tasks_trend
      type: trend_chart
      label: 任务新增趋势
      icon: trending-up
      tone: amber
      data:
        kind: timeseries
        object: task
        range: 14d
      configurable:
        - path: data.range
          label: 时间范围
          type: select
          options: ["7d", "14d", "30d"]

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
