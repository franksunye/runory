id: runory.task
name: Task Management
version: 2.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: task
    label: Task
    fields:
      - key: title
        label: Task Title
        type: text
        ownership: module_owned
        required: true
      - key: description
        label: Description
        type: text
        ownership: module_owned
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "todo"
        validation:
          options: ["todo", "in_progress", "done", "cancelled"]
      - key: priority
        label: Priority
        type: select
        ownership: module_owned
        default_value: "medium"
        validation:
          options: ["low", "medium", "high", "urgent"]
      - key: due_date
        label: Due Date
        type: date
        ownership: module_owned
      - key: assignee
        label: Owner
        type: user
        ownership: module_owned
      - key: company_id
        label: Related Company
        type: text
        ownership: module_owned
      - key: contact_id
        label: Related Contact
        type: text
        ownership: module_owned
      - key: deal_id
        label: Related Deal
        type: text
        ownership: module_owned

views:
  - object: task
    key: task_list
    type: list
    label: Task List
    config:
      columns:
        - field: title
          label: Task Title
        - field: status
          label: Status
        - field: priority
          label: Priority
        - field: due_date
          label: Due Date
        - field: assignee
          label: Owner
      actions:
        - create
        - view
      pageSize: 20

  - object: task
    key: task_form
    type: form
    label: Task Form
    config:
      sections:
        - title: Basic Info
          fields:
            - field: title
              required: true
            - field: description
            - field: status
              required: true
            - field: priority
        - title: Related Info
          fields:
            - field: due_date
            - field: assignee
            - field: company_id
            - field: contact_id
            - field: deal_id

permissions:
  - task.read
  - task.create
  - task.update
  - task.delete

# ── Cross-Pack Relations (v0.2.3) ──
# task references objects owned by other shared modules. These declarations
# enable cross-pack data integrity validation without coupling pack install order.
relations:
  - object: task
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: Related Company
  - object: task
    targetObject: contact
    targetModule: runory.contact
    type: many_to_one
    foreignKey: contact_id
    label: Related Contact
  - object: task
    targetObject: deal
    targetModule: runory.deal
    type: many_to_one
    foreignKey: deal_id
    label: Related Deal

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Task
      route: /tasks
      icon: check-square
      sortOrder: 30

extensionPoints:
  entities:
    - entity: task
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 30
        reservedKeys: [id, title, description, status, priority, due_date, assignee, company_id, contact_id, deal_id, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: task_list
      slots:
        - id: task.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: task_form
      slots:
        - id: task.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: open_tasks_metric
      type: metric_card
      label: Open Tasks
      icon: list-checks
      tone: amber
      data:
        kind: count
        object: task
        where: "status in ('todo', 'in_progress')"
      sub:
        kind: count
        object: task
        where: "status in ('todo', 'in_progress') and due_date < today"
        template: "{count} overdue"
      link: /tasks

    - key: done_tasks_metric
      type: metric_card
      label: Completed Tasks
      icon: check-circle
      tone: green
      data:
        kind: count
        object: task
        where: "status = 'done'"
      link: /tasks

    - key: task_status_breakdown
      type: breakdown
      label: Task Status Distribution
      icon: pie-chart
      tone: slate
      data:
        kind: group_count
        object: task
        groupBy: status
      configurable:
        - path: data.groupBy
          label: Group By
          type: select
          options: [status, priority, assignee]

    - key: open_tasks_list
      type: list
      label: Open Tasks
      icon: check-square
      tone: amber
      data:
        kind: recent
        object: task
        where: "status in ('todo', 'in_progress')"
        orderBy: "priority desc, due_date asc"
        limit: 8
        columns: [title, status, priority, due_date, assignee]
      link: /tasks
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

    - key: new_tasks_trend
      type: trend_chart
      label: New Tasks Trend
      icon: trending-up
      tone: amber
      data:
        kind: timeseries
        object: task
        range: 14d
      configurable:
        - path: data.range
          label: Time Range
          type: select
          options: ["7d", "14d", "30d"]

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
