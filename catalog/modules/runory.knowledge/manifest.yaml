id: runory.knowledge
name: Knowledge Base
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies: []

objects:
  - key: knowledge
    label: Knowledge Article
    fields:
      - key: title
        label: Title
        type: text
        ownership: module_owned
        required: true
      - key: slug
        label: Slug
        type: text
        ownership: module_owned
        required: true
      - key: content
        label: Content
        type: text
        ownership: module_owned
        required: true
      - key: category
        label: Category
        type: text
        ownership: module_owned
        description: "Article category (e.g., troubleshooting, billing, warranty, faq)"
      - key: tags_json
        label: Tags
        type: text
        ownership: module_owned
        description: "JSON array of tags"
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "draft"
        validation:
          options: ["draft", "in_review", "published", "archived"]
      - key: views
        label: Views
        type: number
        ownership: module_owned
        default_value: "0"
      - key: helpful_count
        label: Helpful Count
        type: number
        ownership: module_owned
        default_value: "0"
      - key: not_helpful_count
        label: Not Helpful Count
        type: number
        ownership: module_owned
        default_value: "0"
      - key: author
        label: Author
        type: text
        ownership: module_owned
      - key: published_at
        label: Published At
        type: date
        ownership: module_owned
      - key: owner
        label: Owner
        type: text
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: knowledge
    key: knowledge_list
    type: list
    label: Knowledge Article List
    config:
      columns:
        - field: title
          label: Title
        - field: category
          label: Category
        - field: status
          label: Status
        - field: views
          label: Views
        - field: helpful_count
          label: Helpful Count
        - field: author
          label: Author
      actions:
        - create
        - view
      pageSize: 20

  - object: knowledge
    key: knowledge_form
    type: form
    label: Knowledge Article Form
    config:
      sections:
        - title: Basic Information
          fields:
            - field: title
              required: true
            - field: slug
              required: true
            - field: content
              required: true
            - field: category
            - field: tags_json
            - field: status
              required: true
        - title: Statistics
          fields:
            - field: views
            - field: helpful_count
            - field: not_helpful_count
        - title: Metadata
          fields:
            - field: author
            - field: published_at
            - field: owner
            - field: notes

permissions:
  - knowledge.read
  - knowledge.create
  - knowledge.update
  - knowledge.delete

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Knowledge Base
      route: /knowledge
      icon: book-open
      sortOrder: 62

extensionPoints:
  entities:
    - entity: knowledge
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 10
        reservedKeys: [id, title, slug, content, category, tags_json, status, views, helpful_count, not_helpful_count, author, published_at, owner, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: knowledge_list
      slots:
        - id: knowledge.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: knowledge_form
      slots:
        - id: knowledge.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: published_knowledge_metric
      type: metric_card
      label: Published Articles
      icon: book-open
      tone: emerald
      data:
        kind: count
        object: knowledge
        where: "status = 'published'"
      link: /knowledge

    - key: draft_knowledge_metric
      type: metric_card
      label: Draft Articles
      icon: edit
      tone: amber
      data:
        kind: count
        object: knowledge
        where: "status = 'draft'"
      link: /knowledge

    - key: knowledge_status_breakdown
      type: breakdown
      label: Article Status Distribution
      icon: pie-chart
      tone: cyan
      data:
        kind: group_count
        object: knowledge
        groupBy: status

    - key: popular_knowledge_list
      type: list
      label: Popular Articles
      icon: trending-up
      tone: violet
      data:
        kind: recent
        object: knowledge
        where: "status = 'published'"
        orderBy: "views desc"
        limit: 5
        columns: [title, category, views, helpful_count]
      link: /knowledge
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
