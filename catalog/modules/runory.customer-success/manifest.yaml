id: runory.customer-success
name: Customer Success
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company
  - runory.contact

objects:
  - key: customer_success
    label: Customer Success
    fields:
      - key: followup_number
        label: Follow-up Number
        type: text
        ownership: module_owned
        required: true
      - key: subject
        label: Subject
        type: text
        ownership: module_owned
        required: true
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "scheduled"
        validation:
          options: ["scheduled", "in_progress", "completed", "cancelled", "overdue"]
      - key: followup_type
        label: Follow-up Type
        type: select
        ownership: module_owned
        required: true
        default_value: "check_in"
        validation:
          options: ["check_in", "onboarding", "renewal", "upsell", "satisfaction", "escalation"]
      - key: priority
        label: Priority
        type: select
        ownership: module_owned
        required: true
        default_value: "medium"
        validation:
          options: ["low", "medium", "high", "urgent"]
      - key: scheduled_at
        label: Scheduled At
        type: date
        ownership: module_owned
      - key: completed_at
        label: Completed At
        type: date
        ownership: module_owned
      - key: company_id
        label: Related Company
        type: text
        ownership: module_owned
      - key: contact_id
        label: Related Contact
        type: text
        ownership: module_owned
      - key: deal_id
        label: Related Deal
        type: text
        ownership: module_owned
      - key: task_id
        label: Related Task
        type: text
        ownership: module_owned
      - key: outcome
        label: Follow-up Outcome
        type: text
        ownership: module_owned
        description: "Summary of the follow-up outcome"
      - key: satisfaction_score
        label: Satisfaction Score
        type: number
        ownership: module_owned
        description: "1-10 scale satisfaction score"
      - key: assigned_to
        label: Assigned To
        type: text
        ownership: module_owned
      - key: owner
        label: Owner
        type: text
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: customer_success
    key: customer_success_list
    type: list
    label: Customer Success List
    config:
      columns:
        - field: followup_number
          label: Follow-up Number
        - field: subject
          label: Subject
        - field: status
          label: Status
        - field: followup_type
          label: Follow-up Type
        - field: priority
          label: Priority
        - field: scheduled_at
          label: Scheduled At
        - field: assigned_to
          label: Assigned To
      actions:
        - create
        - view
      pageSize: 20

  - object: customer_success
    key: customer_success_form
    type: form
    label: Customer Success Form
    config:
      sections:
        - title: Basic Information
          fields:
            - field: followup_number
              required: true
            - field: subject
              required: true
            - field: status
              required: true
            - field: followup_type
              required: true
            - field: priority
              required: true
        - title: Time
          fields:
            - field: scheduled_at
            - field: completed_at
        - title: Associations
          fields:
            - field: company_id
            - field: contact_id
            - field: deal_id
            - field: task_id
        - title: Outcome & Metadata
          fields:
            - field: outcome
            - field: satisfaction_score
            - field: assigned_to
            - field: owner
            - field: notes

permissions:
  - customer_success.read
  - customer_success.create
  - customer_success.update
  - customer_success.delete

# ── Cross-Pack Relations (v0.2.9) ──
relations:
  - object: customer_success
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: Related Company
  - object: customer_success
    targetObject: contact
    targetModule: runory.contact
    type: many_to_one
    foreignKey: contact_id
    label: Related Contact
  - object: customer_success
    targetObject: deal
    targetModule: runory.deal
    type: many_to_one
    foreignKey: deal_id
    label: Related Deal
  - object: customer_success
    targetObject: task
    targetModule: runory.task
    type: many_to_one
    foreignKey: task_id
    label: Related Task

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Customer Success
      route: /customer-success
      icon: heart
      sortOrder: 75

extensionPoints:
  entities:
    - entity: customer_success
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 10
        reservedKeys: [id, followup_number, subject, status, followup_type, priority, scheduled_at, completed_at, company_id, contact_id, deal_id, task_id, outcome, satisfaction_score, assigned_to, owner, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: customer_success_list
      slots:
        - id: customer_success.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: customer_success_form
      slots:
        - id: customer_success.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: open_followups_metric
      type: metric_card
      label: Pending Follow-ups
      icon: heart
      tone: amber
      data:
        kind: count
        object: customer_success
        where: "status IN ('scheduled', 'in_progress')"
      link: /customer-success

    - key: overdue_followups_metric
      type: metric_card
      label: Overdue Follow-ups
      icon: alert-triangle
      tone: red
      data:
        kind: count
        object: customer_success
        where: "status = 'overdue'"
      link: /customer-success

    - key: completed_followups_metric
      type: metric_card
      label: Completed Follow-ups
      icon: check-circle
      tone: emerald
      data:
        kind: count
        object: customer_success
        where: "status = 'completed'"
      link: /customer-success

    - key: followup_status_breakdown
      type: breakdown
      label: Follow-up Status Distribution
      icon: pie-chart
      tone: cyan
      data:
        kind: group_count
        object: customer_success
        groupBy: status

    - key: followup_type_breakdown
      type: breakdown
      label: Follow-up Type Distribution
      icon: pie-chart
      tone: violet
      data:
        kind: group_count
        object: customer_success
        groupBy: followup_type

    - key: recent_followups_list
      type: list
      label: Recent Follow-ups
      icon: heart
      tone: cyan
      data:
        kind: recent
        object: customer_success
        orderBy: "created_at desc"
        limit: 8
        columns: [followup_number, subject, status, followup_type, assigned_to]
      link: /customer-success
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

    - key: overdue_followups_list
      type: list
      label: Overdue Follow-ups
      icon: alert-triangle
      tone: red
      data:
        kind: recent
        object: customer_success
        where: "status = 'overdue'"
        orderBy: "scheduled_at asc"
        limit: 5
        columns: [followup_number, subject, scheduled_at, assigned_to]
      link: /customer-success
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
