id: runory.product-service
name: Product / Service Catalog
version: 1.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: product_service
    label: Product / Service
    fields:
      - key: name
        label: Name
        type: text
        ownership: module_owned
        required: true
      - key: type
        label: Type
        type: select
        ownership: module_owned
        required: true
        default_value: "service"
        validation:
          options: ["product", "service", "bundle"]
      - key: sku
        label: SKU
        type: text
        ownership: module_owned
      - key: description
        label: Description
        type: text
        ownership: module_owned
      - key: unit
        label: Unit
        type: text
        ownership: module_owned
      - key: default_price
        label: Default Price
        type: number
        ownership: module_owned
      - key: currency
        label: Currency
        type: text
        ownership: module_owned
        default_value: "CNY"
      - key: active
        label: Active
        type: boolean
        ownership: module_owned
        default_value: "true"
      - key: tax_category
        label: Tax Category
        type: text
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: product_service
    key: product_service_list
    type: list
    label: Product/Service List
    config:
      columns:
        - field: name
          label: Name
        - field: type
          label: Type
        - field: sku
          label: SKU
        - field: default_price
          label: Default Price
        - field: currency
          label: Currency
        - field: active
          label: Active
      actions:
        - create
        - view
      pageSize: 20

  - object: product_service
    key: product_service_form
    type: form
    label: Product/Service Form
    config:
      sections:
        - title: Basic Information
          fields:
            - field: name
              required: true
            - field: type
              required: true
            - field: sku
            - field: description
        - title: Pricing
          fields:
            - field: default_price
            - field: currency
            - field: unit
            - field: tax_category
        - title: Status
          fields:
            - field: active
            - field: notes

permissions:
  - product_service.read
  - product_service.create
  - product_service.update
  - product_service.delete

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Products/Services
      route: /product-services
      icon: package
      sortOrder: 70

extensionPoints:
  entities:
    - entity: product_service
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 30
        reservedKeys: [id, name, type, sku, description, unit, default_price, currency, active, tax_category, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: product_service_list
      slots:
        - id: product_service.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: product_service_form
      slots:
        - id: product_service.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: active_products_metric
      type: metric_card
      label: Active Products/Services
      icon: package
      tone: indigo
      data:
        kind: count
        object: product_service
        where: "active = 1"
      link: /product-services

    - key: product_type_breakdown
      type: breakdown
      label: Product Type Breakdown
      icon: pie-chart
      tone: indigo
      data:
        kind: group_count
        object: product_service
        groupBy: type

    - key: recent_products_list
      type: list
      label: Recent Products/Services
      icon: package
      tone: indigo
      data:
        kind: recent
        object: product_service
        orderBy: "created_at desc"
        limit: 5
        columns: [name, type, default_price, currency]
      link: /product-services
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
