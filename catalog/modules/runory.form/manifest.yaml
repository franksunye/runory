id: runory.form
name: Form Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: form
    label: Form
    fields:
      - key: name
        label: Name
        type: text
        ownership: module_owned
        required: true
      - key: slug
        label: Slug
        type: text
        ownership: module_owned
        required: true
        description: "URL-friendly identifier (e.g., contact-us)"
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "draft"
        validation:
          options: ["draft", "pending_review", "published", "unpublished"]
      - key: target_object
        label: Target Object
        type: select
        ownership: module_owned
        default_value: "contact"
        validation:
          options: ["contact", "company", "deal"]
        description: "Object to create from submissions"
      - key: fields_json
        label: Form Fields
        type: text
        ownership: module_owned
        description: "JSON array of field definitions"
      - key: submit_button_label
        label: Submit Button Label
        type: text
        ownership: module_owned
        default_value: "Submit"
      - key: success_message
        label: Success Message
        type: text
        ownership: module_owned
        default_value: "Thank you for your submission. We will contact you shortly."
      - key: campaign_id
        label: Linked Campaign
        type: text
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: form
    key: form_list
    type: list
    label: Form List
    config:
      columns:
        - field: name
          label: Name
        - field: slug
          label: Slug
        - field: status
          label: Status
        - field: target_object
          label: Target Object
      actions:
        - create
        - view
      pageSize: 20

  - object: form
    key: form_form
    type: form
    label: Form Settings
    config:
      sections:
        - title: Basic Information
          fields:
            - field: name
              required: true
            - field: slug
              required: true
            - field: status
              required: true
        - title: Submission Settings
          fields:
            - field: target_object
            - field: submit_button_label
            - field: success_message
        - title: Advanced
          fields:
            - field: fields_json
            - field: campaign_id
            - field: notes

permissions:
  - form.read
  - form.manage
  - form.submit
  - form.review

# ── Cross-Pack Relations (v0.2.6) ──
relations:
  - object: form
    targetObject: campaign
    targetModule: runory.campaign
    type: many_to_one
    foreignKey: campaign_id
    label: Linked Campaign

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

presentation:
  visibility: management
  surface: forms
  audience: [workspace_administrator]

ui:
  navigation:
    - label: Forms
      route: /forms
      icon: file-plus
      sortOrder: 42

extensionPoints:
  entities:
    - entity: form
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 20
        reservedKeys: [id, name, slug, status, target_object, fields_json, submit_button_label, success_message, campaign_id, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: form_list
      slots:
        - id: form.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: form_form
      slots:
        - id: form.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: published_forms_metric
      type: metric_card
      label: Published Forms
      icon: file-plus
      tone: violet
      data:
        kind: count
        object: form
        where: "status = 'published'"
      link: /forms

    - key: form_status_breakdown
      type: breakdown
      label: Form Status Breakdown
      icon: pie-chart
      tone: violet
      data:
        kind: group_count
        object: form
        groupBy: status

    - key: recent_forms_list
      type: list
      label: Recent Forms
      icon: file-plus
      tone: violet
      data:
        kind: recent
        object: form
        orderBy: "created_at desc"
        limit: 5
        columns: [name, slug, status, target_object]
      link: /forms
      configurable:
        - path: data.limit
          label: Items per Page
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
