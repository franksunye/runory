id: runory.price-book
name: Price Book Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: price_book
    label: Price Book
    fields:
      - key: name
        label: 名称
        type: text
        ownership: module_owned
        required: true
      - key: currency
        label: 币种
        type: text
        ownership: module_owned
        required: true
        default_value: "CNY"
      - key: active
        label: 启用
        type: boolean
        ownership: module_owned
        default_value: "true"
      - key: effective_from
        label: 生效起始
        type: date
        ownership: module_owned
      - key: effective_to
        label: 生效结束
        type: date
        ownership: module_owned
      - key: notes
        label: 备注
        type: text
        ownership: module_owned

views:
  - object: price_book
    key: price_book_list
    type: list
    label: 价格表列表
    config:
      columns:
        - field: name
          label: 名称
        - field: currency
          label: 币种
        - field: effective_from
          label: 生效起始
        - field: effective_to
          label: 生效结束
        - field: active
          label: 启用
      actions:
        - create
        - view
      pageSize: 20

  - object: price_book
    key: price_book_form
    type: form
    label: 价格表表单
    config:
      sections:
        - title: 基本信息
          fields:
            - field: name
              required: true
            - field: currency
              required: true
        - title: 生效期
          fields:
            - field: effective_from
            - field: effective_to
        - title: 状态
          fields:
            - field: active
            - field: notes

permissions:
  - price_book.read
  - price_book.create
  - price_book.update
  - price_book.delete

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: 价格表
      route: /price-books
      icon: tag
      sortOrder: 75

extensionPoints:
  entities:
    - entity: price_book
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 20
        reservedKeys: [id, name, currency, active, effective_from, effective_to, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: price_book_list
      slots:
        - id: price_book.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: price_book_form
      slots:
        - id: price_book.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: active_price_books_metric
      type: metric_card
      label: 启用价格表
      icon: tag
      tone: indigo
      data:
        kind: count
        object: price_book
        where: "active = 1"
      link: /price-books

    - key: recent_price_books_list
      type: list
      label: 最近价格表
      icon: tag
      tone: indigo
      data:
        kind: recent
        object: price_book
        orderBy: "created_at desc"
        limit: 5
        columns: [name, currency, effective_from, effective_to]
      link: /price-books
      configurable:
        - path: data.limit
          label: 显示条数
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
