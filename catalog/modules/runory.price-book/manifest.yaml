id: runory.price-book
name: Price Book Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: price_book
    label: Price Book
    fields:
      - key: name
        label: Name
        type: text
        ownership: module_owned
        required: true
      - key: currency
        label: Currency
        type: text
        ownership: module_owned
        required: true
        default_value: "CNY"
      - key: active
        label: Active
        type: boolean
        ownership: module_owned
        default_value: "true"
      - key: effective_from
        label: Effective From
        type: date
        ownership: module_owned
      - key: effective_to
        label: Effective To
        type: date
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: price_book
    key: price_book_list
    type: list
    label: Price Book List
    config:
      columns:
        - field: name
          label: Name
        - field: currency
          label: Currency
        - field: effective_from
          label: Effective From
        - field: effective_to
          label: Effective To
        - field: active
          label: Active
      actions:
        - create
        - view
      pageSize: 20

  - object: price_book
    key: price_book_form
    type: form
    label: Price Book Form
    config:
      sections:
        - title: Basic Information
          fields:
            - field: name
              required: true
            - field: currency
              required: true
        - title: Effective Period
          fields:
            - field: effective_from
            - field: effective_to
        - title: Status
          fields:
            - field: active
            - field: notes

permissions:
  - price_book.read
  - price_book.create
  - price_book.update
  - price_book.delete

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Price Books
      route: /price-books
      icon: tag
      sortOrder: 75

extensionPoints:
  entities:
    - entity: price_book
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 20
        reservedKeys: [id, name, currency, active, effective_from, effective_to, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: price_book_list
      slots:
        - id: price_book.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: price_book_form
      slots:
        - id: price_book.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: active_price_books_metric
      type: metric_card
      label: Active Price Books
      icon: tag
      tone: indigo
      data:
        kind: count
        object: price_book
        where: "active = 1"
      link: /price-books

    - key: recent_price_books_list
      type: list
      label: Recent Price Books
      icon: tag
      tone: indigo
      data:
        kind: recent
        object: price_book
        orderBy: "created_at desc"
        limit: 5
        columns: [name, currency, effective_from, effective_to]
      link: /price-books
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
