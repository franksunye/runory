id: runory.customer
name: Customer Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: customer
    label: Customer
    fields:
      - key: name
        label: 客户名称
        type: text
        ownership: module_owned
        required: true
      - key: email
        label: 邮箱
        type: email
        ownership: module_owned
      - key: phone
        label: 电话
        type: phone
        ownership: module_owned

views:
  - object: customer
    key: customer_list
    type: list
    label: 客户列表
    config:
      columns:
        - field: name
          label: 客户名称
        - field: email
          label: 邮箱
        - field: phone
          label: 电话
      actions:
        - create
        - view
      pageSize: 20

  - object: customer
    key: customer_form
    type: form
    label: 客户表单
    config:
      sections:
        - title: 基本信息
          fields:
            - field: name
              required: true
            - field: email
            - field: phone

permissions:
  - customer.read
  - customer.create
  - customer.update
  - customer.delete

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: 客户
      route: /customers
      icon: users
      sortOrder: 20

extensionPoints:
  entities:
    - entity: customer
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 50
        reservedKeys: [id, name, email, phone, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: customer_list
      slots:
        - id: customer.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: customer_form
      slots:
        - id: customer.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
