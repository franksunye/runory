id: runory.customer
name: Customer Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: customer
    label: Customer
    fields:
      - key: name
        label: 客户名称
        type: text
        ownership: module_owned
        required: true
      - key: email
        label: 邮箱
        type: email
        ownership: module_owned
      - key: phone
        label: 电话
        type: phone
        ownership: module_owned

views:
  - object: customer
    key: customer_list
    type: list
    label: 客户列表
    config:
      columns:
        - field: name
          label: 客户名称
        - field: email
          label: 邮箱
        - field: phone
          label: 电话
      actions:
        - create
        - view
      pageSize: 20

  - object: customer
    key: customer_form
    type: form
    label: 客户表单
    config:
      sections:
        - title: 基本信息
          fields:
            - field: name
              required: true
            - field: email
            - field: phone

permissions:
  - customer.read
  - customer.create
  - customer.update
  - customer.delete

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: 客户
      route: /customers
      icon: users
      sortOrder: 20

extensionPoints:
  entities:
    - entity: customer
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 50
        reservedKeys: [id, name, email, phone, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: customer_list
      slots:
        - id: customer.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: customer_form
      slots:
        - id: customer.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: customer_total_metric
      type: metric_card
      label: 客户总数
      icon: users
      tone: indigo
      data:
        kind: count
        object: customer
      sub:
        kind: count
        object: customer
        where: "created_at >= now"
        template: "本周新增 {count}"
      link: /customers

    - key: new_customers_trend
      type: trend_chart
      label: 客户新增趋势
      icon: trending-up
      tone: indigo
      data:
        kind: timeseries
        object: customer
        range: 14d
      configurable:
        - path: data.range
          label: 时间范围
          type: select
          options: ["7d", "14d", "30d"]

    - key: recent_customers_list
      type: list
      label: 最近客户
      icon: clock
      tone: slate
      data:
        kind: recent
        object: customer
        orderBy: "created_at desc"
        limit: 5
        columns: [name, email, phone]
      link: /customers
      configurable:
        - path: data.limit
          label: 显示条数
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
