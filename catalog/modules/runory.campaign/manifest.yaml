id: runory.campaign
name: Campaign Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: campaign
    label: Campaign
    fields:
      - key: name
        label: Name
        type: text
        ownership: module_owned
        required: true
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "planning"
        validation:
          options: ["planning", "active", "paused", "completed", "archived"]
      - key: source
        label: Source
        type: text
        ownership: module_owned
        description: "UTM source (e.g., newsletter, google, linkedin)"
      - key: medium
        label: Medium
        type: text
        ownership: module_owned
        description: "UTM medium (e.g., email, cpc, social)"
      - key: start_date
        label: Start Date
        type: date
        ownership: module_owned
      - key: end_date
        label: End Date
        type: date
        ownership: module_owned
      - key: budget
        label: Budget
        type: number
        ownership: module_owned
      - key: currency
        label: Currency
        type: text
        ownership: module_owned
        default_value: "CNY"
      - key: owner
        label: Owner
        type: text
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: campaign
    key: campaign_list
    type: list
    label: Campaign List
    config:
      columns:
        - field: name
          label: Name
        - field: status
          label: Status
        - field: source
          label: Source
        - field: medium
          label: Medium
        - field: start_date
          label: Start Date
        - field: end_date
          label: End Date
      actions:
        - create
        - view
      pageSize: 20

  - object: campaign
    key: campaign_form
    type: form
    label: Campaign Form
    config:
      sections:
        - title: Basic Information
          fields:
            - field: name
              required: true
            - field: status
              required: true
        - title: Source Attribution
          fields:
            - field: source
            - field: medium
        - title: Schedule & Budget
          fields:
            - field: start_date
            - field: end_date
            - field: budget
            - field: currency
        - title: Other
          fields:
            - field: owner
            - field: notes

permissions:
  - campaign.read
  - campaign.create
  - campaign.update
  - campaign.delete

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Campaigns
      route: /campaigns
      icon: megaphone
      sortOrder: 40

extensionPoints:
  entities:
    - entity: campaign
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 20
        reservedKeys: [id, name, status, source, medium, start_date, end_date, budget, currency, owner, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: campaign_list
      slots:
        - id: campaign.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: campaign_form
      slots:
        - id: campaign.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: active_campaigns_metric
      type: metric_card
      label: Active Campaigns
      icon: megaphone
      tone: violet
      data:
        kind: count
        object: campaign
        where: "status = 'active'"
      link: /campaigns

    - key: campaign_status_breakdown
      type: breakdown
      label: Campaign Status Breakdown
      icon: pie-chart
      tone: violet
      data:
        kind: group_count
        object: campaign
        groupBy: status

    - key: recent_campaigns_list
      type: list
      label: Recent Campaigns
      icon: megaphone
      tone: violet
      data:
        kind: recent
        object: campaign
        orderBy: "created_at desc"
        limit: 5
        columns: [name, status, source, medium, start_date]
      link: /campaigns
      configurable:
        - path: data.limit
          label: Items per Page
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
