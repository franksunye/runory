id: runory.warranty
name: Warranty
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company
  - runory.contact

objects:
  - key: warranty
    label: Warranty
    fields:
      - key: warranty_number
        label: 保修编号
        type: text
        ownership: module_owned
        required: true
      - key: title
        label: 标题
        type: text
        ownership: module_owned
        required: true
      - key: status
        label: 状态
        type: select
        ownership: module_owned
        required: true
        default_value: "active"
        validation:
          options: ["active", "expired", "voided", "pending"]
      - key: warranty_type
        label: 保修类型
        type: select
        ownership: module_owned
        required: true
        default_value: "standard"
        validation:
          options: ["standard", "extended", "premium", "trial"]
      - key: start_date
        label: 开始日期
        type: date
        ownership: module_owned
        required: true
      - key: end_date
        label: 结束日期
        type: date
        ownership: module_owned
        required: true
      - key: company_id
        label: 关联公司
        type: text
        ownership: module_owned
      - key: contact_id
        label: 关联联系人
        type: text
        ownership: module_owned
      - key: product_service_id
        label: 关联产品/服务
        type: text
        ownership: module_owned
      - key: asset_id
        label: 关联资产
        type: text
        ownership: module_owned
      - key: quote_id
        label: 关联报价
        type: text
        ownership: module_owned
      - key: terms
        label: 保修条款
        type: text
        ownership: module_owned
        description: "Warranty terms and conditions"
      - key: coverage_json
        label: 覆盖范围
        type: text
        ownership: module_owned
        description: "JSON array of covered items"
      - key: owner
        label: 负责人
        type: text
        ownership: module_owned
      - key: notes
        label: 备注
        type: text
        ownership: module_owned

views:
  - object: warranty
    key: warranty_list
    type: list
    label: 保修列表
    config:
      columns:
        - field: warranty_number
          label: 保修编号
        - field: title
          label: 标题
        - field: status
          label: 状态
        - field: warranty_type
          label: 保修类型
        - field: start_date
          label: 开始日期
        - field: end_date
          label: 结束日期
      actions:
        - create
        - view
      pageSize: 20

  - object: warranty
    key: warranty_form
    type: form
    label: 保修表单
    config:
      sections:
        - title: 基本信息
          fields:
            - field: warranty_number
              required: true
            - field: title
              required: true
            - field: status
              required: true
            - field: warranty_type
              required: true
            - field: start_date
              required: true
            - field: end_date
              required: true
        - title: 关联
          fields:
            - field: company_id
            - field: contact_id
            - field: product_service_id
            - field: asset_id
            - field: quote_id
        - title: 条款与元数据
          fields:
            - field: terms
            - field: coverage_json
            - field: owner
            - field: notes

permissions:
  - warranty.read
  - warranty.create
  - warranty.update
  - warranty.delete

# ── Cross-Pack Relations (v0.2.9) ──
relations:
  - object: warranty
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: 关联公司
  - object: warranty
    targetObject: contact
    targetModule: runory.contact
    type: many_to_one
    foreignKey: contact_id
    label: 关联联系人
  - object: warranty
    targetObject: product_service
    targetModule: runory.product-service
    type: many_to_one
    foreignKey: product_service_id
    label: 关联产品/服务
  - object: warranty
    targetObject: asset
    targetModule: runory.asset
    type: many_to_one
    foreignKey: asset_id
    label: 关联资产
  - object: warranty
    targetObject: quote
    targetModule: runory.quote
    type: many_to_one
    foreignKey: quote_id
    label: 关联报价

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: 保修
      route: /warranties
      icon: shield
      sortOrder: 70

extensionPoints:
  entities:
    - entity: warranty
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 10
        reservedKeys: [id, warranty_number, title, status, warranty_type, start_date, end_date, company_id, contact_id, product_service_id, asset_id, quote_id, terms, coverage_json, owner, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: warranty_list
      slots:
        - id: warranty.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: warranty_form
      slots:
        - id: warranty.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: active_warranties_metric
      type: metric_card
      label: 活跃保修
      icon: shield
      tone: emerald
      data:
        kind: count
        object: warranty
        where: "status = 'active'"
      link: /warranties

    - key: expired_warranties_metric
      type: metric_card
      label: 已过期保修
      icon: shield-off
      tone: red
      data:
        kind: count
        object: warranty
        where: "status = 'expired'"
      link: /warranties

    - key: warranty_status_breakdown
      type: breakdown
      label: 保修状态分布
      icon: pie-chart
      tone: cyan
      data:
        kind: group_count
        object: warranty
        groupBy: status

    - key: warranty_type_breakdown
      type: breakdown
      label: 保修类型分布
      icon: pie-chart
      tone: violet
      data:
        kind: group_count
        object: warranty
        groupBy: warranty_type

    - key: recent_warranties_list
      type: list
      label: 最近保修
      icon: shield
      tone: cyan
      data:
        kind: recent
        object: warranty
        orderBy: "created_at desc"
        limit: 8
        columns: [warranty_number, title, status, warranty_type, end_date]
      link: /warranties
      configurable:
        - path: data.limit
          label: 显示条数
          type: number
          min: 1
          max: 20

    - key: expiring_warranties_list
      type: list
      label: 即将过期保修
      icon: alert-circle
      tone: amber
      data:
        kind: recent
        object: warranty
        where: "status = 'active'"
        orderBy: "end_date asc"
        limit: 5
        columns: [warranty_number, title, end_date]
      link: /warranties
      configurable:
        - path: data.limit
          label: 显示条数
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
