id: runory.company
name: Company Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: company
    label: Company
    fields:
      - key: name
        label: Company Name
        type: text
        ownership: module_owned
        required: true
      - key: domain
        label: Domain
        type: text
        ownership: module_owned
      - key: website
        label: Website
        type: text
        ownership: module_owned
      - key: phone
        label: Phone
        type: phone
        ownership: module_owned
      - key: industry
        label: Industry
        type: select
        ownership: module_owned
        validation:
          options: ["technology", "manufacturing", "services", "retail", "finance", "healthcare", "education", "other"]
      - key: size
        label: Size
        type: select
        ownership: module_owned
        validation:
          options: ["1-10", "11-50", "51-200", "201-1000", "1000+"]
      - key: source
        label: Source
        type: text
        ownership: module_owned
      - key: owner
        label: Owner
        type: user
        ownership: module_owned
      - key: lifecycle_stage
        label: Lifecycle Stage
        type: select
        ownership: module_owned
        required: true
        default_value: "lead"
        validation:
          options: ["lead", "marketing_qualified", "sales_qualified", "opportunity", "customer", "inactive"]
      - key: address
        label: Address
        type: text
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: company
    key: company_list
    type: list
    label: Company List
    config:
      columns:
        - field: name
          label: Company Name
        - field: industry
          label: Industry
        - field: lifecycle_stage
          label: Stage
        - field: owner
          label: Owner
      actions:
        - create
        - view
      pageSize: 20

  - object: company
    key: company_form
    type: form
    label: Company Form
    config:
      sections:
        - title: Basic Info
          fields:
            - field: name
              required: true
            - field: domain
            - field: website
            - field: phone
        - title: Classification
          fields:
            - field: industry
            - field: size
            - field: source
            - field: owner
        - title: Business Status
          fields:
            - field: lifecycle_stage
              required: true
            - field: address
            - field: notes

permissions:
  - company.read
  - company.create
  - company.update
  - company.delete

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

presentation:
  visibility: top_level
  surface: customers
  audience: [sales_representative, sales_manager, dispatcher]

ui:
  navigation:
    - label: Company
      route: /companies
      icon: building
      sortOrder: 10

extensionPoints:
  entities:
    - entity: company
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 50
        reservedKeys: [id, name, domain, website, phone, industry, size, source, owner, lifecycle_stage, address, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: company_list
      slots:
        - id: company.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: company_form
      slots:
        - id: company.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: company_total_metric
      type: metric_card
      label: Total Companies
      icon: building
      tone: indigo
      data:
        kind: count
        object: company
      sub:
        kind: count
        object: company
        where: "lifecycle_stage = 'customer'"
        template: "{count} customers"
      link: /companies

    - key: new_companies_trend
      type: trend_chart
      label: New Companies Trend
      icon: trending-up
      tone: indigo
      data:
        kind: timeseries
        object: company
        range: 14d
      configurable:
        - path: data.range
          label: Time Range
          type: select
          options: ["7d", "14d", "30d"]

    - key: company_stage_breakdown
      type: breakdown
      label: Company Stage Distribution
      icon: pie-chart
      tone: slate
      data:
        kind: group_count
        object: company
        groupBy: lifecycle_stage

    - key: recent_companies_list
      type: list
      label: Recent Companies
      icon: clock
      tone: slate
      data:
        kind: recent
        object: company
        orderBy: "created_at desc"
        limit: 5
        columns: [name, industry, lifecycle_stage]
      link: /companies
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
