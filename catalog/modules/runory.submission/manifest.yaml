id: runory.submission
name: Form Submission Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company
  - runory.contact
  - runory.deal
  - runory.form
  - runory.landing-page
  - runory.campaign

objects:
  - key: submission
    label: Submission
    fields:
      - key: form_id
        label: Linked Form
        type: text
        ownership: module_owned
        required: true
      - key: landing_page_id
        label: Source Landing Page
        type: text
        ownership: module_owned
      - key: campaign_id
        label: Source Campaign
        type: text
        ownership: module_owned
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "new"
        validation:
          options: ["new", "processing", "converted", "rejected", "spam"]
      - key: payload_json
        label: Submission Data
        type: text
        ownership: module_owned
        description: "JSON of submitted form fields"
      - key: contact_id
        label: Linked Contact
        type: text
        ownership: module_owned
      - key: company_id
        label: Linked Company
        type: text
        ownership: module_owned
      - key: deal_id
        label: Linked Deal
        type: text
        ownership: module_owned
      - key: source_url
        label: Source URL
        type: text
        ownership: module_owned
      - key: referrer
        label: Referrer Page
        type: text
        ownership: module_owned
      - key: ip_address
        label: IP Address
        type: text
        ownership: module_owned
      - key: user_agent
        label: User Agent
        type: text
        ownership: module_owned
      - key: consent_given
        label: Consent Given
        type: boolean
        ownership: module_owned
        default_value: "false"
      - key: consent_text
        label: Consent Terms
        type: text
        ownership: module_owned
      - key: processed_by
        label: Processed By
        type: text
        ownership: module_owned
      - key: processed_at
        label: Processed At
        type: date
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: submission
    key: submission_list
    type: list
    label: Submission List
    config:
      columns:
        - field: status
          label: Status
        - field: form_id
          label: Linked Form
        - field: campaign_id
          label: Source Campaign
        - field: contact_id
          label: Linked Contact
        - field: company_id
          label: Linked Company
        - field: consent_given
          label: Consent Given
        - field: created_at
          label: Submitted At
      actions:
        - create
        - view
      pageSize: 20

  - object: submission
    key: submission_form
    type: form
    label: Submission Details
    config:
      sections:
        - title: Basic Information
          fields:
            - field: form_id
              required: true
            - field: status
              required: true
        - title: Source Attribution
          fields:
            - field: landing_page_id
            - field: campaign_id
            - field: source_url
            - field: referrer
        - title: Linked Records
          fields:
            - field: contact_id
            - field: company_id
            - field: deal_id
        - title: Submission Data
          fields:
            - field: payload_json
        - title: Consent & Processing
          fields:
            - field: consent_given
            - field: consent_text
            - field: ip_address
            - field: user_agent
            - field: processed_by
            - field: processed_at
            - field: notes

permissions:
  - submission.read
  - submission.create
  - submission.update
  - submission.delete

# ── Cross-Pack Relations (v0.2.6) ──
# submission references form/landing_page/campaign (same pack) and
# company/contact/deal (shared CRM modules).
relations:
  - object: submission
    targetObject: form
    targetModule: runory.form
    type: many_to_one
    foreignKey: form_id
    label: Linked Form
  - object: submission
    targetObject: landing_page
    targetModule: runory.landing-page
    type: many_to_one
    foreignKey: landing_page_id
    label: Source Landing Page
  - object: submission
    targetObject: campaign
    targetModule: runory.campaign
    type: many_to_one
    foreignKey: campaign_id
    label: Source Campaign
  - object: submission
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: Linked Company
  - object: submission
    targetObject: contact
    targetModule: runory.contact
    type: many_to_one
    foreignKey: contact_id
    label: Linked Contact
  - object: submission
    targetObject: deal
    targetModule: runory.deal
    type: many_to_one
    foreignKey: deal_id
    label: Linked Deal

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Submissions
      route: /submissions
      icon: inbox
      sortOrder: 43

extensionPoints:
  entities:
    - entity: submission
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 20
        reservedKeys: [id, form_id, landing_page_id, campaign_id, status, payload_json, contact_id, company_id, deal_id, source_url, referrer, ip_address, user_agent, consent_given, consent_text, processed_by, processed_at, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: submission_list
      slots:
        - id: submission.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: submission_form
      slots:
        - id: submission.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: new_submissions_metric
      type: metric_card
      label: New Submissions
      icon: inbox
      tone: violet
      data:
        kind: count
        object: submission
        where: "status = 'new'"
      link: /submissions

    - key: submission_status_breakdown
      type: breakdown
      label: Submission Status Breakdown
      icon: pie-chart
      tone: violet
      data:
        kind: group_count
        object: submission
        groupBy: status

    - key: recent_submissions_list
      type: list
      label: Recent Submissions
      icon: inbox
      tone: violet
      data:
        kind: recent
        object: submission
        orderBy: "created_at desc"
        limit: 8
        columns: [status, form_id, campaign_id, consent_given, created_at]
      link: /submissions
      configurable:
        - path: data.limit
          label: Items per Page
          type: number
          min: 1
          max: 20

    - key: new_submissions_trend
      type: trend_chart
      label: New Submissions Trend
      icon: trending-up
      tone: violet
      data:
        kind: timeseries
        object: submission
        range: 14d
      configurable:
        - path: data.range
          label: Time Range
          type: select
          options: ["7d", "14d", "30d"]

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
