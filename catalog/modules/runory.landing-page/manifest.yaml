id: runory.landing-page
name: Landing Page Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

objects:
  - key: landing_page
    label: Landing Page
    fields:
      - key: title
        label: Title
        type: text
        ownership: module_owned
        required: true
      - key: slug
        label: Slug
        type: text
        ownership: module_owned
        required: true
        description: "Public URL path (e.g., /p/summer-promo)"
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "draft"
        validation:
          options: ["draft", "pending_review", "published", "unpublished"]
      - key: headline
        label: Headline
        type: text
        ownership: module_owned
      - key: subheadline
        label: Subheadline
        type: text
        ownership: module_owned
      - key: body_html
        label: Body Content
        type: text
        ownership: module_owned
        description: "HTML content of the landing page"
      - key: cta_text
        label: Call-to-Action Text
        type: text
        ownership: module_owned
        default_value: "Apply Now"
      - key: form_id
        label: Linked Form
        type: text
        ownership: module_owned
      - key: campaign_id
        label: Linked Campaign
        type: text
        ownership: module_owned
      - key: meta_description
        label: SEO Description
        type: text
        ownership: module_owned
      - key: published_at
        label: Published At
        type: date
        ownership: module_owned
      - key: owner
        label: Owner
        type: user
        ownership: module_owned

views:
  - object: landing_page
    key: landing_page_list
    type: list
    label: Landing Page List
    config:
      columns:
        - field: title
          label: Title
        - field: slug
          label: Slug
        - field: status
          label: Status
        - field: campaign_id
          label: Linked Campaign
        - field: published_at
          label: Published At
      actions:
        - create
        - view
      pageSize: 20

  - object: landing_page
    key: landing_page_form
    type: form
    label: Landing Page Settings
    config:
      sections:
        - title: Basic Information
          fields:
            - field: title
              required: true
            - field: slug
              required: true
            - field: status
              required: true
        - title: Content
          fields:
            - field: headline
            - field: subheadline
            - field: body_html
            - field: cta_text
        - title: Associations
          fields:
            - field: form_id
            - field: campaign_id
        - title: SEO & Publishing
          fields:
            - field: meta_description
            - field: published_at
            - field: owner

permissions:
  - landing_page.read
  - landing_page.create
  - landing_page.update
  - landing_page.delete

# ── Cross-Pack Relations (v0.2.6) ──
relations:
  - object: landing_page
    targetObject: form
    targetModule: runory.form
    type: many_to_one
    foreignKey: form_id
    label: Linked Form
  - object: landing_page
    targetObject: campaign
    targetModule: runory.campaign
    type: many_to_one
    foreignKey: campaign_id
    label: Linked Campaign

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Landing Pages
      route: /landing-pages
      icon: layout
      sortOrder: 41

extensionPoints:
  entities:
    - entity: landing_page
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 20
        reservedKeys: [id, title, slug, status, headline, subheadline, body_html, cta_text, form_id, campaign_id, meta_description, published_at, owner, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: landing_page_list
      slots:
        - id: landing_page.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: landing_page_form
      slots:
        - id: landing_page.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: published_landing_pages_metric
      type: metric_card
      label: Published Landing Pages
      icon: layout
      tone: violet
      data:
        kind: count
        object: landing_page
        where: "status = 'published'"
      link: /landing-pages

    - key: landing_page_status_breakdown
      type: breakdown
      label: Landing Page Status Breakdown
      icon: pie-chart
      tone: violet
      data:
        kind: group_count
        object: landing_page
        groupBy: status

    - key: recent_landing_pages_list
      type: list
      label: Recent Landing Pages
      icon: layout
      tone: violet
      data:
        kind: recent
        object: landing_page
        orderBy: "created_at desc"
        limit: 5
        columns: [title, slug, status, published_at]
      link: /landing-pages
      configurable:
        - path: data.limit
          label: Items per Page
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
