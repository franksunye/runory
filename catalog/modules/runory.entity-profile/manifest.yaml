id: runory.entity-profile
name: Entity Profile Management
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company
  - runory.product-service
  - runory.landing-page

objects:
  - key: entity_profile
    label: Entity Profile
    fields:
      - key: name
        label: Name
        type: text
        ownership: module_owned
        required: true
      - key: entity_type
        label: Entity Type
        type: select
        ownership: module_owned
        required: true
        default_value: "topic"
        validation:
          options: ["product_service", "landing_page", "company", "topic"]
      - key: target_object
        label: Target Object
        type: text
        ownership: module_owned
        description: "Object key when entity_type references a business record"
      - key: target_id
        label: Target Record ID
        type: text
        ownership: module_owned
        description: "Record ID when entity_type references a business record"
      - key: company_id
        label: Linked Company
        type: text
        ownership: module_owned
      - key: product_service_id
        label: Linked Product/Service
        type: text
        ownership: module_owned
      - key: landing_page_id
        label: Linked Landing Page
        type: text
        ownership: module_owned
      - key: description
        label: Description
        type: text
        ownership: module_owned
      - key: keywords_json
        label: Keywords
        type: text
        ownership: module_owned
        description: "JSON array of target keywords"
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "active"
        validation:
          options: ["active", "inactive", "archived"]
      - key: locale
        label: Locale
        type: text
        ownership: module_owned
        default_value: "zh-CN"
      - key: owner
        label: Owner
        type: text
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: entity_profile
    key: entity_profile_list
    type: list
    label: Entity Profile List
    config:
      columns:
        - field: name
          label: Name
        - field: entity_type
          label: Entity Type
        - field: status
          label: Status
        - field: locale
          label: Locale
        - field: owner
          label: Owner
      actions:
        - create
        - view
      pageSize: 20

  - object: entity_profile
    key: entity_profile_form
    type: form
    label: Entity Profile Form
    config:
      sections:
        - title: Basic Information
          fields:
            - field: name
              required: true
            - field: entity_type
              required: true
            - field: status
              required: true
        - title: Associations
          fields:
            - field: target_object
            - field: target_id
            - field: company_id
            - field: product_service_id
            - field: landing_page_id
        - title: Content
          fields:
            - field: description
            - field: keywords_json
            - field: locale
        - title: Other
          fields:
            - field: owner
            - field: notes

permissions:
  - entity_profile.read
  - entity_profile.create
  - entity_profile.update
  - entity_profile.delete

# ── Cross-Pack Relations (v0.2.7) ──
# entity_profile references company (shared), product_service (Sales Quote Pack),
# and landing_page (Marketing Capture Pack).
relations:
  - object: entity_profile
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: Linked Company
  - object: entity_profile
    targetObject: product_service
    targetModule: runory.product-service
    type: many_to_one
    foreignKey: product_service_id
    label: Linked Product/Service
  - object: entity_profile
    targetObject: landing_page
    targetModule: runory.landing-page
    type: many_to_one
    foreignKey: landing_page_id
    label: Linked Landing Page

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Entity Profiles
      route: /entity-profiles
      icon: globe
      sortOrder: 50

extensionPoints:
  entities:
    - entity: entity_profile
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 20
        reservedKeys: [id, name, entity_type, target_object, target_id, company_id, product_service_id, landing_page_id, description, keywords_json, status, locale, owner, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: entity_profile_list
      slots:
        - id: entity_profile.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: entity_profile_form
      slots:
        - id: entity_profile.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: active_entity_profiles_metric
      type: metric_card
      label: Active Entity Profiles
      icon: globe
      tone: cyan
      data:
        kind: count
        object: entity_profile
        where: "status = 'active'"
      link: /entity-profiles

    - key: entity_profile_type_breakdown
      type: breakdown
      label: Entity Type Breakdown
      icon: pie-chart
      tone: cyan
      data:
        kind: group_count
        object: entity_profile
        groupBy: entity_type

    - key: recent_entity_profiles_list
      type: list
      label: Recent Entity Profiles
      icon: globe
      tone: cyan
      data:
        kind: recent
        object: entity_profile
        orderBy: "created_at desc"
        limit: 5
        columns: [name, entity_type, status, locale]
      link: /entity-profiles
      configurable:
        - path: data.limit
          label: Items per Page
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
