id: runory.contact
name: Contact Management
version: 2.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company

objects:
  - key: contact
    label: Contact
    fields:
      - key: name
        label: Contact Name
        type: text
        ownership: module_owned
        required: true
      - key: email
        label: Email
        type: email
        ownership: module_owned
      - key: phone
        label: Phone
        type: phone
        ownership: module_owned
      - key: title
        label: Job Title
        type: text
        ownership: module_owned
      - key: role
        label: Role
        type: text
        ownership: module_owned
      - key: primary_company_id
        label: Related Company
        type: text
        ownership: module_owned
      - key: source
        label: Source
        type: text
        ownership: module_owned
      - key: owner
        label: Owner
        type: text
        ownership: module_owned
      - key: lifecycle_stage
        label: Lifecycle Stage
        type: select
        ownership: module_owned
        validation:
          options: ["lead", "marketing_qualified", "sales_qualified", "opportunity", "customer", "inactive"]
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: contact
    key: contact_list
    type: list
    label: Contact List
    config:
      columns:
        - field: name
          label: Contact Name
        - field: email
          label: Email
        - field: phone
          label: Phone
        - field: primary_company_id
          label: Related Company
      actions:
        - create
        - view
      pageSize: 20

  - object: contact
    key: contact_form
    type: form
    label: Contact Form
    config:
      sections:
        - title: Basic Info
          fields:
            - field: name
              required: true
            - field: email
            - field: phone
        - title: Professional Info
          fields:
            - field: title
            - field: role
            - field: primary_company_id
        - title: Follow-up Info
          fields:
            - field: source
            - field: owner
            - field: lifecycle_stage
            - field: notes

permissions:
  - contact.read
  - contact.create
  - contact.update
  - contact.delete

relations:
  - object: contact
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: primary_company_id
    label: Related Company

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

presentation:
  visibility: contextual
  surface: customers
  audience: [sales_representative, sales_manager, dispatcher]

ui:
  navigation:
    - label: Contact
      route: /contacts
      icon: users
      sortOrder: 20

extensionPoints:
  entities:
    - entity: contact
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 30
        reservedKeys: [id, name, email, phone, title, role, primary_company_id, source, owner, lifecycle_stage, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: contact_list
      slots:
        - id: contact.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: contact_form
      slots:
        - id: contact.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: contact_total_metric
      type: metric_card
      label: Total Contacts
      icon: user-plus
      tone: emerald
      data:
        kind: count
        object: contact
      sub:
        kind: count
        object: contact
        where: "created_at >= now"
        template: "New this week: {count}"
      link: /contacts

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
