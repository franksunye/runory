id: runory.contact
name: Contact Management
version: 2.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company

objects:
  - key: contact
    label: Contact
    fields:
      - key: name
        label: 联系人姓名
        type: text
        ownership: module_owned
        required: true
      - key: email
        label: 邮箱
        type: email
        ownership: module_owned
      - key: phone
        label: 电话
        type: phone
        ownership: module_owned
      - key: title
        label: 职位
        type: text
        ownership: module_owned
      - key: role
        label: 角色
        type: text
        ownership: module_owned
      - key: primary_company_id
        label: 关联公司
        type: text
        ownership: module_owned
      - key: source
        label: 来源
        type: text
        ownership: module_owned
      - key: owner
        label: 负责人
        type: text
        ownership: module_owned
      - key: lifecycle_stage
        label: 生命周期阶段
        type: select
        ownership: module_owned
        validation:
          options: ["lead", "marketing_qualified", "sales_qualified", "opportunity", "customer", "inactive"]
      - key: notes
        label: 备注
        type: text
        ownership: module_owned

views:
  - object: contact
    key: contact_list
    type: list
    label: 联系人列表
    config:
      columns:
        - field: name
          label: 联系人姓名
        - field: email
          label: 邮箱
        - field: phone
          label: 电话
        - field: primary_company_id
          label: 关联公司
      actions:
        - create
        - view
      pageSize: 20

  - object: contact
    key: contact_form
    type: form
    label: 联系人表单
    config:
      sections:
        - title: 基本信息
          fields:
            - field: name
              required: true
            - field: email
            - field: phone
        - title: 职业信息
          fields:
            - field: title
            - field: role
            - field: primary_company_id
        - title: 跟进信息
          fields:
            - field: source
            - field: owner
            - field: lifecycle_stage
            - field: notes

permissions:
  - contact.read
  - contact.create
  - contact.update
  - contact.delete

relations:
  - object: contact
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: primary_company_id
    label: 关联公司

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: 联系人
      route: /contacts
      icon: users
      sortOrder: 20

extensionPoints:
  entities:
    - entity: contact
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 30
        reservedKeys: [id, name, email, phone, title, role, primary_company_id, source, owner, lifecycle_stage, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: contact_list
      slots:
        - id: contact.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: contact_form
      slots:
        - id: contact.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: contact_total_metric
      type: metric_card
      label: 联系人总数
      icon: user-plus
      tone: emerald
      data:
        kind: count
        object: contact
      sub:
        kind: count
        object: contact
        where: "created_at >= now"
        template: "本周新增 {count}"
      link: /contacts

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
