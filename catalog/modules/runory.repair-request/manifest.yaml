id: runory.repair-request
name: Repair Request
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company
  - runory.contact

objects:
  - key: repair_request
    label: Repair Request
    fields:
      - key: repair_number
        label: 维修编号
        type: text
        ownership: module_owned
        required: true
      - key: issue_description
        label: 故障描述
        type: text
        ownership: module_owned
        required: true
      - key: status
        label: 状态
        type: select
        ownership: module_owned
        required: true
        default_value: "requested"
        validation:
          options: ["requested", "diagnosing", "quoted", "in_repair", "completed", "rejected", "closed"]
      - key: priority
        label: 优先级
        type: select
        ownership: module_owned
        required: true
        default_value: "medium"
        validation:
          options: ["low", "medium", "high", "urgent"]
      - key: repair_type
        label: 维修类型
        type: select
        ownership: module_owned
        required: true
        default_value: "on_site"
        validation:
          options: ["on_site", "in_workshop", "remote", "emergency"]
      - key: is_warranty
        label: 保修内维修
        type: boolean
        ownership: module_owned
        default_value: "false"
      - key: is_paid
        label: 付费维修
        type: boolean
        ownership: module_owned
        default_value: "false"
      - key: estimated_cost
        label: 预估费用
        type: number
        ownership: module_owned
      - key: actual_cost
        label: 实际费用
        type: number
        ownership: module_owned
      - key: requested_at
        label: 申请时间
        type: date
        ownership: module_owned
      - key: completed_at
        label: 完成时间
        type: date
        ownership: module_owned
      - key: company_id
        label: 关联公司
        type: text
        ownership: module_owned
      - key: contact_id
        label: 关联联系人
        type: text
        ownership: module_owned
      - key: asset_id
        label: 关联资产
        type: text
        ownership: module_owned
      - key: ticket_id
        label: 关联工单
        type: text
        ownership: module_owned
      - key: work_order_id
        label: 关联工单（FSM）
        type: text
        ownership: module_owned
        description: "FSM work order created when onsite service is needed"
      - key: quote_id
        label: 关联报价
        type: text
        ownership: module_owned
        description: "Quote created for paid repair"
      - key: warranty_id
        label: 关联保修
        type: text
        ownership: module_owned
      - key: assigned_to
        label: 分配给
        type: text
        ownership: module_owned
      - key: owner
        label: 负责人
        type: text
        ownership: module_owned
      - key: notes
        label: 备注
        type: text
        ownership: module_owned

views:
  - object: repair_request
    key: repair_request_list
    type: list
    label: 维修列表
    config:
      columns:
        - field: repair_number
          label: 维修编号
        - field: issue_description
          label: 故障描述
        - field: status
          label: 状态
        - field: priority
          label: 优先级
        - field: repair_type
          label: 维修类型
        - field: is_warranty
          label: 保修内
        - field: assigned_to
          label: 分配给
      actions:
        - create
        - view
      pageSize: 20

  - object: repair_request
    key: repair_request_form
    type: form
    label: 维修表单
    config:
      sections:
        - title: 基本信息
          fields:
            - field: repair_number
              required: true
            - field: issue_description
              required: true
            - field: status
              required: true
            - field: priority
              required: true
            - field: repair_type
              required: true
            - field: is_warranty
            - field: is_paid
        - title: 费用与时间
          fields:
            - field: estimated_cost
            - field: actual_cost
            - field: requested_at
            - field: completed_at
        - title: 关联
          fields:
            - field: company_id
            - field: contact_id
            - field: asset_id
            - field: ticket_id
            - field: work_order_id
            - field: quote_id
            - field: warranty_id
        - title: 元数据
          fields:
            - field: assigned_to
            - field: owner
            - field: notes

permissions:
  - repair_request.read
  - repair_request.create
  - repair_request.update
  - repair_request.delete

# ── Cross-Pack Relations (v0.2.9) ──
relations:
  - object: repair_request
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: 关联公司
  - object: repair_request
    targetObject: contact
    targetModule: runory.contact
    type: many_to_one
    foreignKey: contact_id
    label: 关联联系人
  - object: repair_request
    targetObject: asset
    targetModule: runory.asset
    type: many_to_one
    foreignKey: asset_id
    label: 关联资产
  - object: repair_request
    targetObject: ticket
    targetModule: runory.ticket
    type: many_to_one
    foreignKey: ticket_id
    label: 关联工单
  - object: repair_request
    targetObject: work_order
    targetModule: runory.work-order
    type: many_to_one
    foreignKey: work_order_id
    label: 关联工单（FSM）
  - object: repair_request
    targetObject: quote
    targetModule: runory.quote
    type: many_to_one
    foreignKey: quote_id
    label: 关联报价

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: 维修
      route: /repair-requests
      icon: wrench
      sortOrder: 73

extensionPoints:
  entities:
    - entity: repair_request
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 10
        reservedKeys: [id, repair_number, issue_description, status, priority, repair_type, is_warranty, is_paid, estimated_cost, actual_cost, requested_at, completed_at, company_id, contact_id, asset_id, ticket_id, work_order_id, quote_id, warranty_id, assigned_to, owner, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: repair_request_list
      slots:
        - id: repair_request.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: repair_request_form
      slots:
        - id: repair_request.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: open_repairs_metric
      type: metric_card
      label: 待处理维修
      icon: wrench
      tone: amber
      data:
        kind: count
        object: repair_request
        where: "status IN ('requested', 'diagnosing', 'quoted', 'in_repair')"
      link: /repair-requests

    - key: completed_repairs_metric
      type: metric_card
      label: 已完成维修
      icon: check-circle
      tone: emerald
      data:
        kind: count
        object: repair_request
        where: "status = 'completed'"
      link: /repair-requests

    - key: warranty_repairs_metric
      type: metric_card
      label: 保修内维修
      icon: shield
      tone: cyan
      data:
        kind: count
        object: repair_request
        where: "is_warranty = 1"
      link: /repair-requests

    - key: repair_status_breakdown
      type: breakdown
      label: 维修状态分布
      icon: pie-chart
      tone: cyan
      data:
        kind: group_count
        object: repair_request
        groupBy: status

    - key: repair_type_breakdown
      type: breakdown
      label: 维修类型分布
      icon: pie-chart
      tone: violet
      data:
        kind: group_count
        object: repair_request
        groupBy: repair_type

    - key: recent_repairs_list
      type: list
      label: 最近维修
      icon: wrench
      tone: cyan
      data:
        kind: recent
        object: repair_request
        orderBy: "created_at desc"
        limit: 8
        columns: [repair_number, issue_description, status, priority, assigned_to]
      link: /repair-requests
      configurable:
        - path: data.limit
          label: 显示条数
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
