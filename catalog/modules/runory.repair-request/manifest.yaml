id: runory.repair-request
name: Repair Request
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company
  - runory.contact

objects:
  - key: repair_request
    label: Repair Request
    fields:
      - key: repair_number
        label: Repair Number
        type: text
        ownership: module_owned
        required: true
      - key: issue_description
        label: Issue Description
        type: text
        ownership: module_owned
        required: true
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "requested"
        validation:
          options: ["requested", "diagnosing", "quoted", "in_repair", "completed", "rejected", "closed"]
      - key: priority
        label: Priority
        type: select
        ownership: module_owned
        required: true
        default_value: "medium"
        validation:
          options: ["low", "medium", "high", "urgent"]
      - key: repair_type
        label: Repair Type
        type: select
        ownership: module_owned
        required: true
        default_value: "on_site"
        validation:
          options: ["on_site", "in_workshop", "remote", "emergency"]
      - key: is_warranty
        label: Warranty Repair
        type: boolean
        ownership: module_owned
        default_value: "false"
      - key: is_paid
        label: Paid Repair
        type: boolean
        ownership: module_owned
        default_value: "false"
      - key: estimated_cost
        label: Estimated Cost
        type: number
        ownership: module_owned
      - key: actual_cost
        label: Actual Cost
        type: number
        ownership: module_owned
      - key: requested_at
        label: Requested At
        type: date
        ownership: module_owned
      - key: completed_at
        label: Completed At
        type: date
        ownership: module_owned
      - key: company_id
        label: Related Company
        type: text
        ownership: module_owned
      - key: contact_id
        label: Related Contact
        type: text
        ownership: module_owned
      - key: asset_id
        label: Related Asset
        type: text
        ownership: module_owned
      - key: ticket_id
        label: Related Ticket
        type: text
        ownership: module_owned
      - key: work_order_id
        label: Related Work Order (FSM)
        type: text
        ownership: module_owned
        description: "FSM work order created when onsite service is needed"
      - key: quote_id
        label: Related Quote
        type: text
        ownership: module_owned
        description: "Quote created for paid repair"
      - key: warranty_id
        label: Related Warranty
        type: text
        ownership: module_owned
      - key: assigned_to
        label: Assigned To
        type: text
        ownership: module_owned
      - key: owner
        label: Owner
        type: user
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: repair_request
    key: repair_request_list
    type: list
    label: Repair List
    config:
      columns:
        - field: repair_number
          label: Repair Number
        - field: issue_description
          label: Issue Description
        - field: status
          label: Status
        - field: priority
          label: Priority
        - field: repair_type
          label: Repair Type
        - field: is_warranty
          label: Under Warranty
        - field: assigned_to
          label: Assigned To
      actions:
        - create
        - view
      pageSize: 20

  - object: repair_request
    key: repair_request_form
    type: form
    label: Repair Form
    config:
      sections:
        - title: Basic Information
          fields:
            - field: repair_number
              required: true
            - field: issue_description
              required: true
            - field: status
              required: true
            - field: priority
              required: true
            - field: repair_type
              required: true
            - field: is_warranty
            - field: is_paid
        - title: Cost & Time
          fields:
            - field: estimated_cost
            - field: actual_cost
            - field: requested_at
            - field: completed_at
        - title: Associations
          fields:
            - field: company_id
            - field: contact_id
            - field: asset_id
            - field: ticket_id
            - field: work_order_id
            - field: quote_id
            - field: warranty_id
        - title: Metadata
          fields:
            - field: assigned_to
            - field: owner
            - field: notes

permissions:
  - repair_request.read
  - repair_request.create
  - repair_request.update
  - repair_request.delete

# ── Cross-Pack Relations (v0.2.9) ──
relations:
  - object: repair_request
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: Related Company
  - object: repair_request
    targetObject: contact
    targetModule: runory.contact
    type: many_to_one
    foreignKey: contact_id
    label: Related Contact
  - object: repair_request
    targetObject: asset
    targetModule: runory.asset
    type: many_to_one
    foreignKey: asset_id
    label: Related Asset
  - object: repair_request
    targetObject: ticket
    targetModule: runory.ticket
    type: many_to_one
    foreignKey: ticket_id
    label: Related Ticket
  - object: repair_request
    targetObject: work_order
    targetModule: runory.work-order
    type: many_to_one
    foreignKey: work_order_id
    label: Related Work Order (FSM)
  - object: repair_request
    targetObject: quote
    targetModule: runory.quote
    type: many_to_one
    foreignKey: quote_id
    label: Related Quote

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Repairs
      route: /repair-requests
      icon: wrench
      sortOrder: 73

extensionPoints:
  entities:
    - entity: repair_request
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 10
        reservedKeys: [id, repair_number, issue_description, status, priority, repair_type, is_warranty, is_paid, estimated_cost, actual_cost, requested_at, completed_at, company_id, contact_id, asset_id, ticket_id, work_order_id, quote_id, warranty_id, assigned_to, owner, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: repair_request_list
      slots:
        - id: repair_request.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: repair_request_form
      slots:
        - id: repair_request.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: open_repairs_metric
      type: metric_card
      label: Pending Repairs
      icon: wrench
      tone: amber
      data:
        kind: count
        object: repair_request
        where: "status IN ('requested', 'diagnosing', 'quoted', 'in_repair')"
      link: /repair-requests

    - key: completed_repairs_metric
      type: metric_card
      label: Completed Repairs
      icon: check-circle
      tone: emerald
      data:
        kind: count
        object: repair_request
        where: "status = 'completed'"
      link: /repair-requests

    - key: warranty_repairs_metric
      type: metric_card
      label: Warranty Repairs
      icon: shield
      tone: cyan
      data:
        kind: count
        object: repair_request
        where: "is_warranty = 1"
      link: /repair-requests

    - key: repair_status_breakdown
      type: breakdown
      label: Repair Status Distribution
      icon: pie-chart
      tone: cyan
      data:
        kind: group_count
        object: repair_request
        groupBy: status

    - key: repair_type_breakdown
      type: breakdown
      label: Repair Type Distribution
      icon: pie-chart
      tone: violet
      data:
        kind: group_count
        object: repair_request
        groupBy: repair_type

    - key: recent_repairs_list
      type: list
      label: Recent Repairs
      icon: wrench
      tone: cyan
      data:
        kind: recent
        object: repair_request
        orderBy: "created_at desc"
        limit: 8
        columns: [repair_number, issue_description, status, priority, assigned_to]
      link: /repair-requests
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
