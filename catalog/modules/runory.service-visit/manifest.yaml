id: runory.service-visit
name: Service Visit Management
version: 1.1.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.work-order
  - runory.technician

objects:
  - key: service_visit
    label: Service Visit
    fields:
      - key: title
        label: Title
        type: text
        ownership: module_owned
      - key: work_order_id
        label: Related Work Order
        type: text
        ownership: module_owned
        required: true
      - key: technician_id
        label: Assigned Technician
        type: text
        ownership: module_owned
      - key: scheduled_start
        label: Scheduled Start
        type: date
        ownership: module_owned
        required: true
      - key: scheduled_end
        label: Scheduled End
        type: date
        ownership: module_owned
      - key: actual_start
        label: Actual Start
        type: date
        ownership: module_owned
      - key: actual_end
        label: Actual End
        type: date
        ownership: module_owned
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "unplanned"
        validation:
          options: ["unplanned", "scheduled", "en_route", "on_site", "completed", "cancelled"]
      - key: notes
        label: Notes
        type: text
        ownership: module_owned
      - key: aggregate_version
        label: Aggregate Version
        type: number
        ownership: module_owned
        required: true
        default_value: "1"
      - key: assignment_id
        label: Assignment
        type: text
        ownership: module_owned
      - key: schedule_entry_id
        label: Schedule Entry
        type: text
        ownership: module_owned
      - key: outcome
        label: Outcome
        type: text
        ownership: module_owned

views:
  - object: service_visit
    key: service_visit_list
    type: list
    label: Service Visit List
    config:
      columns:
        - field: title
          label: Title
        - field: work_order_id
          label: Related Work Order
        - field: technician_id
          label: Assigned Technician
        - field: scheduled_start
          label: Scheduled Start
        - field: status
          label: Status
      actions:
        - create
        - view
      pageSize: 20

  - object: service_visit
    key: service_visit_form
    type: form
    label: Service Visit Form
    config:
      sections:
        - title: Basic Info
          fields:
            - field: title
            - field: work_order_id
              required: true
            - field: technician_id
            - field: status
              required: true
        - title: Schedule Info
          fields:
            - field: scheduled_start
              required: true
            - field: scheduled_end
            - field: actual_start
            - field: actual_end
        - title: Other
          fields:
            - field: notes

domain:
  aggregates:
    - key: service_visit
      stateField: status
      versionField: aggregate_version
  commands:
    - key: visit.start_travel
      contractVersion: "1.0.0"
      aggregate: service_visit
      transition:
        from: [scheduled]
        to: en_route
      allowedActorTypes: [user, api_key, system]
      permission: visit.execute
      idempotent: true
      requiresExpectedVersion: true
      requiredEffects:
        - capability: fsm.activate_visit_execution
          version: "^1.0.0"
          scope: linked_visit_execution
          consistency: atomic
          cardinality: one
      emits: [visit.travel_started]
      auditRequired: true
      postconditions:
        - service_visit.status == en_route
        - visit_execution.status == active
    - key: visit.arrive
      contractVersion: "1.0.0"
      aggregate: service_visit
      transition:
        from: [en_route]
        to: on_site
      allowedActorTypes: [user, api_key, system]
      permission: visit.execute
      idempotent: true
      requiresExpectedVersion: true
      requiredEffects: []
      emits: [visit.arrived_on_site]
      auditRequired: true
      postconditions:
        - service_visit.status == on_site
    - key: visit.submit_work
      contractVersion: "1.0.0"
      aggregate: service_visit
      transition:
        from: [on_site]
        to: on_site
      allowedActorTypes: [user, api_key, system]
      permission: visit.execute
      idempotent: true
      requiresExpectedVersion: true
      requiredEffects: []
      emits: [visit.work_submitted]
      auditRequired: true
      postconditions:
        - service_visit.status == on_site
    - key: visit.complete
      contractVersion: "1.0.0"
      aggregate: service_visit
      transition:
        from: [on_site]
        to: completed
      allowedActorTypes: [user, api_key, system]
      permission: visit.execute
      idempotent: true
      requiresExpectedVersion: true
      requiredEffects:
        - capability: scheduling.complete_reservation
          version: "^1.0.0"
          scope: linked_schedule
          consistency: atomic
          cardinality: one
      emits: [visit.completed]
      auditRequired: true
      resultAssertions:
        - { field: actual_end, operator: not_null }
      postconditions:
        - service_visit.status == completed
        - visit_execution.status == completed
        - linked_schedule.status == completed
    - key: visit.cancel
      contractVersion: "1.0.0"
      aggregate: service_visit
      transition:
        from: [unplanned, scheduled, en_route, on_site]
        to: cancelled
      allowedActorTypes: [user, api_key, system]
      permission: visit.execute
      idempotent: true
      requiresExpectedVersion: true
      requiredEffects:
        - capability: fsm.cancel_visit_execution
          version: "^1.0.0"
          scope: linked_visit_execution
          consistency: atomic
          cardinality: zero_or_one
        - capability: scheduling.cancel_reservation
          version: "^1.0.0"
          scope: linked_schedule
          consistency: atomic
          cardinality: zero_or_one
      emits: [visit.cancelled]
      auditRequired: true
      postconditions:
        - service_visit.status == cancelled
        - visit_execution.status != active
        - linked_schedule.status != confirmed

permissions:
  - service_visit.read
  - visit.execute

# ── Cross-Pack Relations (v0.2.4) ──
relations:
  - object: service_visit
    targetObject: work_order
    targetModule: runory.work-order
    type: many_to_one
    foreignKey: work_order_id
    label: Related Work Order
    backlinkPresentation:
      mode: compact
      columns:
        - field: title
        - field: technician_id
        - field: scheduled_start
        - field: scheduled_end
        - field: status
      limit: 5
  - object: service_visit
    targetObject: technician
    targetModule: runory.technician
    type: many_to_one
    foreignKey: technician_id
    label: Assigned Technician

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data
  upgrade:
    - from: "1.0.0"
      to: "1.1.0"
      script: v1.1/migrations/upgrade-from-1.0.sql
      risk: low

presentation:
  visibility: contextual
  surface: work_orders
  audience: [dispatcher, field_technician]

ui:
  navigation:
    - label: Service Visit
      route: /service-visits
      icon: calendar
      sortOrder: 45

extensionPoints:
  entities:
    - entity: service_visit
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 20
        reservedKeys: [id, title, work_order_id, technician_id, scheduled_start, scheduled_end, actual_start, actual_end, status, notes, aggregate_version, assignment_id, schedule_entry_id, outcome, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: service_visit_list
      slots:
        - id: service_visit.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: service_visit_form
      slots:
        - id: service_visit.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: scheduled_visits_today_metric
      type: metric_card
      label: Today's Visits
      icon: calendar
      tone: blue
      data:
        kind: count
        object: service_visit
        where: "scheduled_start = today and status not in ('completed', 'cancelled')"
      link: /service-visits

    - key: service_visit_status_breakdown
      type: breakdown
      label: Visit Status Distribution
      icon: pie-chart
      tone: blue
      data:
        kind: group_count
        object: service_visit
        groupBy: status

    - key: today_schedule_list
      type: list
      label: Today's Schedule
      icon: calendar
      tone: blue
      data:
        kind: recent
        object: service_visit
        where: "scheduled_start = today"
        orderBy: "scheduled_start asc"
        limit: 10
        columns: [work_order_id, technician_id, scheduled_start, status]
      link: /service-visits
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
