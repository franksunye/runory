id: runory.maintenance-plan
name: Maintenance Plan
version: 1.0.0
coreCompatibility: ">=0.1.0"

dependencies:
  - runory.company
  - runory.contact

objects:
  - key: maintenance_plan
    label: Maintenance Plan
    fields:
      - key: plan_number
        label: Plan Number
        type: text
        ownership: module_owned
        required: true
      - key: name
        label: Plan Name
        type: text
        ownership: module_owned
        required: true
      - key: status
        label: Status
        type: select
        ownership: module_owned
        required: true
        default_value: "active"
        validation:
          options: ["active", "paused", "completed", "cancelled"]
      - key: plan_type
        label: Plan Type
        type: select
        ownership: module_owned
        required: true
        default_value: "recurring"
        validation:
          options: ["recurring", "one_time", "seasonal", "preventive"]
      - key: frequency
        label: Frequency
        type: select
        ownership: module_owned
        default_value: "quarterly"
        validation:
          options: ["monthly", "quarterly", "semi_annual", "annual", "custom"]
      - key: start_date
        label: Start Date
        type: date
        ownership: module_owned
        required: true
      - key: end_date
        label: End Date
        type: date
        ownership: module_owned
      - key: next_visit_date
        label: Next Visit Date
        type: date
        ownership: module_owned
      - key: total_visits
        label: Total Visits
        type: number
        ownership: module_owned
        default_value: "0"
      - key: completed_visits
        label: Completed Visits
        type: number
        ownership: module_owned
        default_value: "0"
      - key: company_id
        label: Related Company
        type: text
        ownership: module_owned
      - key: contact_id
        label: Related Contact
        type: text
        ownership: module_owned
      - key: asset_id
        label: Related Asset
        type: text
        ownership: module_owned
      - key: task_id
        label: Related Task
        type: text
        ownership: module_owned
        description: "Follow-up task generated by this plan"
      - key: work_order_id
        label: Related Work Order (FSM)
        type: text
        ownership: module_owned
        description: "Follow-up work order generated by this plan"
      - key: owner
        label: Owner
        type: user
        ownership: module_owned
      - key: notes
        label: Notes
        type: text
        ownership: module_owned

views:
  - object: maintenance_plan
    key: maintenance_plan_list
    type: list
    label: Maintenance Plan List
    config:
      columns:
        - field: plan_number
          label: Plan Number
        - field: name
          label: Plan Name
        - field: status
          label: Status
        - field: plan_type
          label: Plan Type
        - field: frequency
          label: Frequency
        - field: next_visit_date
          label: Next Visit
      actions:
        - create
        - view
      pageSize: 20

  - object: maintenance_plan
    key: maintenance_plan_form
    type: form
    label: Maintenance Plan Form
    config:
      sections:
        - title: Basic Information
          fields:
            - field: plan_number
              required: true
            - field: name
              required: true
            - field: status
              required: true
            - field: plan_type
              required: true
            - field: frequency
        - title: Time & Progress
          fields:
            - field: start_date
              required: true
            - field: end_date
            - field: next_visit_date
            - field: total_visits
            - field: completed_visits
        - title: Associations
          fields:
            - field: company_id
            - field: contact_id
            - field: asset_id
            - field: task_id
            - field: work_order_id
        - title: Metadata
          fields:
            - field: owner
            - field: notes

permissions:
  - maintenance_plan.read
  - maintenance_plan.create
  - maintenance_plan.update
  - maintenance_plan.delete

# ── Cross-Pack Relations (v0.2.9) ──
relations:
  - object: maintenance_plan
    targetObject: company
    targetModule: runory.company
    type: many_to_one
    foreignKey: company_id
    label: Related Company
  - object: maintenance_plan
    targetObject: contact
    targetModule: runory.contact
    type: many_to_one
    foreignKey: contact_id
    label: Related Contact
  - object: maintenance_plan
    targetObject: asset
    targetModule: runory.asset
    type: many_to_one
    foreignKey: asset_id
    label: Related Asset
  - object: maintenance_plan
    targetObject: task
    targetModule: runory.task
    type: many_to_one
    foreignKey: task_id
    label: Related Task
  - object: maintenance_plan
    targetObject: work_order
    targetModule: runory.work-order
    type: many_to_one
    foreignKey: work_order_id
    label: Related Work Order (FSM)

migrations:
  install: migrations/install.sql
  uninstallPolicy: retain_data

ui:
  navigation:
    - label: Maintenance Plans
      route: /maintenance-plans
      icon: calendar
      sortOrder: 74

extensionPoints:
  entities:
    - entity: maintenance_plan
      customFields:
        enabled: true
        allowedTypes: [text, number, date, select, boolean]
        maxFields: 10
        reservedKeys: [id, plan_number, name, status, plan_type, frequency, start_date, end_date, next_visit_date, total_visits, completed_visits, company_id, contact_id, asset_id, task_id, work_order_id, owner, notes, created_at, updated_at]
      customRelations:
        enabled: false
  views:
    - view: maintenance_plan_list
      slots:
        - id: maintenance_plan.list.columns
          type: column_group
          allowedExtensions: [customField]
          risk: low
      allowReorder: true
      allowFilters: true
      allowPageSizeChange: true
    - view: maintenance_plan_form
      slots:
        - id: maintenance_plan.form.basic_fields.after
          type: field_group
          allowedExtensions: [customField]
          risk: low
      allowAddSection: true
      allowAddAction: true

dashboard:
  widgets:
    - key: active_plans_metric
      type: metric_card
      label: Active Maintenance Plans
      icon: calendar
      tone: emerald
      data:
        kind: count
        object: maintenance_plan
        where: "status = 'active'"
      link: /maintenance-plans

    - key: upcoming_visits_metric
      type: metric_card
      label: Upcoming Visits
      icon: clock
      tone: amber
      data:
        kind: count
        object: maintenance_plan
        where: "status = 'active'"
      link: /maintenance-plans

    - key: plan_status_breakdown
      type: breakdown
      label: Plan Status Distribution
      icon: pie-chart
      tone: cyan
      data:
        kind: group_count
        object: maintenance_plan
        groupBy: status

    - key: plan_type_breakdown
      type: breakdown
      label: Plan Type Distribution
      icon: pie-chart
      tone: violet
      data:
        kind: group_count
        object: maintenance_plan
        groupBy: plan_type

    - key: recent_plans_list
      type: list
      label: Recent Maintenance Plans
      icon: calendar
      tone: cyan
      data:
        kind: recent
        object: maintenance_plan
        orderBy: "created_at desc"
        limit: 8
        columns: [plan_number, name, status, frequency, next_visit_date]
      link: /maintenance-plans
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

    - key: upcoming_visits_list
      type: list
      label: Upcoming Visit Plans
      icon: clock
      tone: amber
      data:
        kind: recent
        object: maintenance_plan
        where: "status = 'active'"
        orderBy: "next_visit_date asc"
        limit: 5
        columns: [plan_number, name, next_visit_date, company_id]
      link: /maintenance-plans
      configurable:
        - path: data.limit
          label: Display Count
          type: number
          min: 1
          max: 20

upgradePolicy:
  supportsWorkspaceExtensions: true
  breakingChangePolicy: manual_review
