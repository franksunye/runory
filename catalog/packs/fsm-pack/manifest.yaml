id: fsm-pack
name: Field Service Management Pack
version: 1.0.0
coreCompatibility: ">=0.1.0"

description: "Field Service Management — work orders, technicians, service sites, and assets"
recommended: true
onboardingChecklist:
  - id: create-work-order
    label: "Create your first work order"
    route: "/work-orders/new"
  - id: create-technician
    label: "Add a technician"
    route: "/technicians/new"
  - id: create-service-site
    label: "Add a service site"
    route: "/service-sites/new"
  - id: load-demo
    label: "Load sample data to explore"
    route: "/modules"

mobileNavigation:
  - key: today
    label: Today
    route: /
    icon: home
    order: 10
  - key: schedule
    label: Schedule
    route: /schedule
    icon: calendar
    order: 40
  - key: work-orders
    label: Work Orders
    route: /work-orders
    icon: clipboard-list
    order: 50

workspaceSurfaces:
  - key: my_work
    audience: [dispatcher, field_technician, service_supervisor, workspace_administrator]
  - key: planning
    audience: [dispatcher, field_technician, service_supervisor, workspace_administrator]
  - key: activity

# FSM Pack composes shared business modules (company, contact, task) with
# FSM-specific modules. Shared modules are reused, not duplicated.
modules:
  - "runory.company:^1.0.0"
  - "runory.contact:^2.0.0"
  - "runory.task:^2.0.0"
  - "runory.service-site:^1.0.0"
  - "runory.asset:^1.0.0"
  - "runory.technician:^1.1.0"
  - "runory.work-order:^1.1.0"
  - "runory.service-visit:^1.1.0"
  - "runory.service-report:^1.0.0"
  - "runory.payment:^0.2.0"
  - "runory.invoice:^1.0.0"

# v0.4 — Pack-aware permission groups.
permissionGroups:
  - key: dispatcher
    label: "Dispatcher"
    description: "Can triage work orders and manage assignments and schedules"
    businessRole:
      key: dispatcher
      label: "Dispatcher"
      description: "Coordinates field work, assignments, and schedules"
    permissions: ["work_order.read", "work_order.triage", "work_order.create", "work_order.start", "payment.view", "invoice.read", "assignment.manage", "schedule.manage", "schedule.conflict.override"]
  - key: field_technician
    label: "Field Technician"
    description: "Can execute assigned visits and submit forms"
    businessRole:
      key: field_technician
      label: "Field Technician"
      description: "Executes assigned field work and captures service evidence"
    permissions: ["work_order.read", "visit.execute", "forms.submission.edit", "forms.submission.submit"]
  - key: service_supervisor
    label: "Service Supervisor"
    description: "Can complete work orders, review forms, and reopen work"
    businessRole:
      key: service_supervisor
      label: "Service Supervisor"
      description: "Supervises service execution, evidence, and completion"
    permissions: ["work_order.read", "work_order.start", "work_order.complete", "work_order.reopen", "payment.view", "payment.request", "payment.refund", "invoice.read", "invoice.issue", "invoice.void", "forms.submission.review", "workflow.approval.decide", "workflow.work_item.act"]
  - key: workspace_administrator
    label: "Workspace Administrator"
    description: "Full access to all FSM operations"
    permissions: ["*"]

defaultTemplate: small-business-field-service

# Pack-specific terminology overlay (v0.2.3).
# FSM labels the shared "company" object as "Customer" for field-service
# context, without forking the underlying object definition.
terminology:
  - object: company
    label: Customer
    navigationLabel: Customer
    route: /companies
  - object: task
    label: Service Task
    navigationLabel: Service Task
    route: /tasks

# FSM operational workbench — focuses on dispatch, schedule, and completion.
dashboard:
  defaultLayout:
    - zone: metrics
      widgets:
        - { module: runory.work-order,    widget: open_work_orders_metric,        instance: default }
        - { module: runory.work-order,    widget: overdue_work_orders_metric,     instance: default }
        - { module: runory.work-order,    widget: schedule_today_count,           instance: default }
        - { module: runory.service-visit, widget: scheduled_visits_today_metric,  instance: default }
        - { module: runory.asset,         widget: active_assets_metric,           instance: default }
        - { module: runory.invoice,       widget: outstanding_invoices_metric,    instance: default }

    - zone: trends
      widgets:
        - { module: runory.work-order, widget: new_work_orders_trend, instance: default }

    - zone: lists
      widgets:
        - { module: runory.work-order,    widget: work_orders_needing_dispatch_list, instance: default }
        - { module: runory.work-order,    widget: schedule_upcoming_list,            instance: default }
        - { module: runory.service-visit, widget: today_schedule_list,               instance: default }
        - { module: runory.service-report, widget: recent_service_reports_list,      instance: default }
        - { module: runory.invoice,        widget: overdue_invoices_list,             instance: default }

    - zone: activity
      widgets:
        - { module: _platform, widget: business_activity_feed, instance: default }

marketplace:
  category: field_service
  license: runory_official
  publisher: runory
