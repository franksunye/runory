id: shared-business-consumer-pack
name: Shared Business Consumer Pack
version: 1.0.0
coreCompatibility: ">=0.1.0"

description: "Shared Business — customer, consent, and campaign foundations"
onboardingChecklist:
  - id: create-customer
    label: "Create customer profile"
    route: "/customers/new"
  - id: setup-consent
    label: "Configure consent preferences"
    route: "/consents/new"
  - id: create-campaign
    label: "Create a campaign"
    route: "/campaigns/new"

# Shares runory.company and runory.task with crm-lite-pack.
# This pack validates that two packs can depend on the same shared business
# modules without duplicate install or duplicate navigation chaos (v0.2.3).
modules:
  - "runory.company:^1.0.0"
  - "runory.task:^2.0.0"

# Pack-specific terminology overlay (v0.2.3).
# This pack labels the shared "company" object as "Customer Enterprise"
# and "task" as "Service Order" without forking the underlying objects.
terminology:
  - object: company
    label: Customer Enterprise
    navigationLabel: Customer Enterprise
    route: /companies
  - object: task
    label: Service Order
    navigationLabel: Service Order
    route: /tasks

marketplace:
  category: general
  license: runory_official
  publisher: runory
