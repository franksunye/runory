id: customer-service-pack
name: Customer Service Pack
version: 1.0.1
coreCompatibility: ">=0.1.0"

description: "Customer Service — tickets, SLA, and knowledge base management"
onboardingChecklist:
  - id: create-ticket
    label: "Create a support ticket"
    route: "/tickets/new"
  - id: setup-sla
    label: "Configure an SLA policy"
    route: "/support-slas/new"
  - id: create-knowledge
    label: "Add a knowledge base article"
    route: "/knowledge/new"

# Customer Service Pack adds support communication and issue resolution.
# It composes shared business modules (company, contact, task) with 4
# customer-service-specific modules. Cross-pack relations to FSM (asset,
# work_order) and Sales Quote (quote) work when those packs are also
# installed, and gracefully resolve to null otherwise.
modules:
  - "runory.company:^1.0.0"
  - "runory.contact:^2.0.0"
  - "runory.task:^2.0.0"
  - "runory.ticket:^1.0.0"
  - "runory.conversation:^1.0.0"
  - "runory.knowledge:^1.0.0"
  - "runory.support-sla:^1.0.0"

defaultTemplate: small-business-customer-service

# Pack-specific terminology overlay (v0.2.3).
terminology:
  - object: company
    label: 客户
    navigationLabel: 客户
    route: /companies

# Customer Service workbench — focuses on ticket volume, resolution,
# escalation, and knowledge coverage.
dashboard:
  defaultLayout:
    - zone: metrics
      widgets:
        - { module: runory.ticket,        widget: open_tickets_metric,          instance: default }
        - { module: runory.ticket,        widget: escalated_tickets_metric,     instance: default }
        - { module: runory.ticket,        widget: resolved_tickets_metric,      instance: default }
        - { module: runory.knowledge,     widget: published_knowledge_metric,   instance: default }
        - { module: runory.support-sla,   widget: active_sla_metric,            instance: default }

    - zone: trends
      widgets:
        - { module: _platform, widget: business_activity_feed, instance: default }

    - zone: lists
      widgets:
        - { module: runory.ticket,        widget: escalated_tickets_list,       instance: default }
        - { module: runory.ticket,        widget: recent_tickets_list,          instance: default }
        - { module: runory.conversation,  widget: recent_conversations_list,    instance: default }
        - { module: runory.knowledge,     widget: popular_knowledge_list,       instance: default }
        - { module: runory.support-sla,   widget: recent_sla_list,              instance: default }
        - { module: runory.ticket,        widget: ticket_status_breakdown,      instance: default }
        - { module: runory.ticket,        widget: ticket_priority_breakdown,    instance: default }
        - { module: runory.ticket,        widget: ticket_channel_breakdown,     instance: default }
        - { module: runory.knowledge,     widget: knowledge_status_breakdown,   instance: default }
        - { module: runory.support-sla,   widget: sla_priority_breakdown,       instance: default }

    - zone: activity
      widgets:
        - { module: _platform, widget: business_activity_feed, instance: default }

marketplace:
  category: customer_service
  license: runory_official
  publisher: runory
