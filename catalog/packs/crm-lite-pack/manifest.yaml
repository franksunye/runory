id: crm-lite-pack
name: CRM Lite Pack
version: 2.0.0
coreCompatibility: ">=0.1.0"

description: "Lightweight CRM — manage companies, contacts, deals, and tasks"
recommended: true
onboardingChecklist:
  - id: create-company
    label: "Create your first company"
    route: "/companies/new"
  - id: create-contact
    label: "Add a contact"
    route: "/contacts/new"
  - id: create-deal
    label: "Create a deal"
    route: "/deals/new"
  - id: load-demo
    label: "Load sample data to explore"
    route: "/modules"

mobileNavigation:
  - key: today
    label: Today
    route: /
    icon: home
    order: 10
  - key: customers
    label: Customers
    route: /customers
    icon: building
    order: 20

workspaceSurfaces:
  - key: activity

modules:
  - "runory.company:^1.0.0"
  - "runory.contact:^2.0.0"
  - "runory.deal:^1.0.0"
  - "runory.task:^2.0.0"

defaultTemplate: small-business-crm

dashboard:
  defaultLayout:
    - zone: metrics
      widgets:
        - { module: runory.company, widget: company_total_metric, instance: default }
        - { module: runory.contact, widget: contact_total_metric, instance: default }
        - { module: runory.deal,    widget: open_deals_metric,    instance: default }
        - { module: runory.task,    widget: open_tasks_metric,    instance: default }

    - zone: trends
      widgets:
        - { module: runory.company, widget: new_companies_trend, instance: default }
        - { module: runory.deal,    widget: new_deals_trend,     instance: default }

    - zone: lists
      widgets:
        - { module: runory.deal,    widget: open_deals_list,      instance: default }
        - { module: runory.task,    widget: open_tasks_list,      instance: default }
        - { module: runory.company, widget: recent_companies_list, instance: default }

    - zone: activity
      widgets:
        - { module: _platform, widget: business_activity_feed, instance: default }

marketplace:
  category: crm
  license: runory_official
  publisher: runory

# v0.3.6 — Pack-aware permission groups
permissionGroups:
  - key: sales_admin
    label: "Sales Admin"
    description: "Full permissions to manage companies, contacts, deals, and tasks"
    businessRole:
      key: sales_manager
      label: "Sales Manager"
      description: "Leads the commercial team across CRM, quotes, and approvals"
    permissions:
      - company.read
      - company.create
      - company.update
      - company.delete
      - contact.read
      - contact.create
      - contact.update
      - contact.delete
      - deal.read
      - deal.create
      - deal.update
      - deal.delete
      - task.read
      - task.create
      - task.update
      - task.delete
  - key: sales_agent
    label: "Sales Agent"
    description: "Can view and create companies, contacts, and deals; manage own tasks"
    businessRole:
      key: sales_representative
      label: "Sales Representative"
      description: "Manages customers, opportunities, and commercial proposals"
    permissions:
      - company.read
      - company.create
      - company.update
      - contact.read
      - contact.create
      - contact.update
      - deal.read
      - deal.create
      - deal.update
      - task.read
      - task.create
      - task.update
  - key: sales_viewer
    label: "Sales Viewer"
    description: "View CRM data only; no editing"
    businessRole:
      key: sales_viewer
      label: "Sales Viewer"
      description: "Can inspect commercial records without changing them"
    permissions:
      - company.read
      - contact.read
      - deal.read
      - task.read
