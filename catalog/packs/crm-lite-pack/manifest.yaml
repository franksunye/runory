id: crm-lite-pack
name: CRM Lite Pack
version: 2.0.0
coreCompatibility: ">=0.1.0"

description: "轻量级客户关系管理 — 管理公司、联系人、商机和任务"
recommended: true
onboardingChecklist:
  - id: create-company
    label: "创建第一个公司"
    route: "/companies/new"
  - id: create-contact
    label: "添加联系人"
    route: "/contacts/new"
  - id: create-deal
    label: "创建商机"
    route: "/deals/new"
  - id: load-demo
    label: "加载示例数据体验"
    route: "/modules"

modules:
  - "runory.company:^1.0.0"
  - "runory.contact:^2.0.0"
  - "runory.deal:^1.0.0"
  - "runory.task:^2.0.0"

defaultTemplate: small-business-crm

dashboard:
  defaultLayout:
    - zone: metrics
      widgets:
        - { module: runory.company, widget: company_total_metric, instance: default }
        - { module: runory.contact, widget: contact_total_metric, instance: default }
        - { module: runory.deal,    widget: open_deals_metric,    instance: default }
        - { module: runory.task,    widget: open_tasks_metric,    instance: default }

    - zone: trends
      widgets:
        - { module: runory.company, widget: new_companies_trend, instance: default }
        - { module: runory.deal,    widget: new_deals_trend,     instance: default }

    - zone: lists
      widgets:
        - { module: runory.deal,    widget: open_deals_list,      instance: default }
        - { module: runory.task,    widget: open_tasks_list,      instance: default }
        - { module: runory.company, widget: recent_companies_list, instance: default }

    - zone: activity
      widgets:
        - { module: _platform, widget: business_activity_feed, instance: default }

marketplace:
  category: crm
  license: runory_official
  publisher: runory

# v0.3.6 — Pack-aware permission groups
permissionGroups:
  - key: sales_admin
    label: "销售管理员"
    description: "管理公司、联系人、商机和任务的完整权限"
    permissions:
      - company.read
      - company.create
      - company.update
      - company.delete
      - contact.read
      - contact.create
      - contact.update
      - contact.delete
      - deal.read
      - deal.create
      - deal.update
      - deal.delete
      - task.read
      - task.create
      - task.update
      - task.delete
  - key: sales_agent
    label: "销售专员"
    description: "可查看和创建公司、联系人、商机，管理自己的任务"
    permissions:
      - company.read
      - company.create
      - company.update
      - contact.read
      - contact.create
      - contact.update
      - deal.read
      - deal.create
      - deal.update
      - task.read
      - task.create
      - task.update
  - key: sales_viewer
    label: "销售只读"
    description: "仅可查看 CRM 数据，不可编辑"
    permissions:
      - company.read
      - contact.read
      - deal.read
      - task.read
