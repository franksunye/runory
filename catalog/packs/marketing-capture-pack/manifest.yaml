id: marketing-capture-pack
name: Marketing Capture Pack
version: 1.0.0
coreCompatibility: ">=0.1.0"

description: "Marketing Capture — landing pages, forms, and submission management"
onboardingChecklist:
  - id: create-landing-page
    label: "Create a landing page"
    route: "/landing-pages/new"
  - id: create-form
    label: "Create a form"
    route: "/forms/new"
  - id: view-submissions
    label: "View submissions"
    route: "/submissions"

workspaceSurfaces:
  - key: activity

# Marketing Capture Pack composes shared business modules (company, contact,
# deal) with marketing-specific modules for public demand capture.
modules:
  - "runory.company:^1.0.0"
  - "runory.contact:^2.0.0"
  - "runory.deal:^1.0.0"
  - "runory.campaign:^1.0.0"
  - "runory.form:^1.0.0"
  - "runory.landing-page:^1.0.0"
  - "runory.submission:^1.0.0"
  - "runory.consent:^1.0.0"

defaultTemplate: small-business-marketing-capture

# Pack-specific terminology overlay (v0.2.3).
# Marketing Capture labels the shared "company" object as "Customer"
# and "deal" as "Opportunity" for marketing context.
terminology:
  - object: company
    label: Customer
    navigationLabel: Customer
    route: /companies
  - object: deal
    label: Opportunity
    navigationLabel: Opportunity
    route: /deals

# Marketing workbench — focuses on capture, conversion, and consent.
dashboard:
  defaultLayout:
    - zone: metrics
      widgets:
        - { module: runory.submission,     widget: new_submissions_metric,          instance: default }
        - { module: runory.campaign,       widget: active_campaigns_metric,         instance: default }
        - { module: runory.form,           widget: published_forms_metric,          instance: default }
        - { module: runory.landing-page,   widget: published_landing_pages_metric,  instance: default }
        - { module: runory.consent,        widget: active_consents_metric,          instance: default }

    - zone: trends
      widgets:
        - { module: runory.submission, widget: new_submissions_trend, instance: default }

    - zone: lists
      widgets:
        - { module: runory.submission,   widget: recent_submissions_list,          instance: default }
        - { module: runory.campaign,     widget: recent_campaigns_list,            instance: default }
        - { module: runory.form,         widget: recent_forms_list,                instance: default }
        - { module: runory.landing-page, widget: recent_landing_pages_list,        instance: default }
        - { module: runory.consent,      widget: recent_consents_list,             instance: default }

    - zone: activity
      widgets:
        - { module: _platform, widget: business_activity_feed, instance: default }

marketplace:
  category: marketing
  license: runory_official
  publisher: runory
