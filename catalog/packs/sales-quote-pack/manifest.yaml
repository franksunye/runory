id: sales-quote-pack
name: Sales Quote Pack
version: 1.0.0
coreCompatibility: ">=0.1.0"

description: "Sales Quote — product/services, price books, and quote management"
onboardingChecklist:
  - id: create-product
    label: "Create a product or service"
    route: "/product-services/new"
  - id: create-price-book
    label: "Set up a price book"
    route: "/price-books/new"
  - id: create-quote
    label: "Create a quote"
    route: "/quotes/new"

mobileNavigation:
  - key: today
    label: Today
    route: /
    icon: home
    order: 10
  - key: customers
    label: Customers
    route: /customers
    icon: building
    order: 20
  - key: quotes
    label: Quotes
    route: /quotes
    icon: file-text
    order: 30

workspaceSurfaces:
  - key: my_work
    audience: [sales_representative, sales_manager, workspace_administrator]
  - key: activity

# Sales Quote Pack composes shared business modules (company, contact, deal)
# with FSM-owned modules (work_order, service_site, asset) and Quote-specific
# modules. Shared and FSM modules are reused, not duplicated.
modules:
  - "runory.company:^1.0.0"
  - "runory.contact:^2.0.0"
  - "runory.deal:^1.0.0"
  - "runory.product-service:^1.0.0"
  - "runory.price-book:^1.0.0"
  - "runory.quote:^1.0.0"

# v0.4 — Pack-aware permission groups.
# The standalone quote_approval module is retired (v0.5); quote approval is now
# handled via Workflow approval work items. The sales_manager group includes the
# workflow.approval.decide permission to approve/reject submitted quotes.
permissionGroups:
  - key: sales_representative
    label: "Sales Representative"
    description: "Can create and submit quotes for approval"
    businessRole:
      key: sales_representative
      label: "Sales Representative"
      description: "Manages customers, opportunities, and commercial proposals"
    permissions: ["quote.read", "quote.create", "quote.edit_draft", "quote.submit", "product_service.read", "price_book.read", "price_book_item.read"]
  - key: sales_manager
    label: "Sales Manager"
    description: "Can approve or reject submitted quotes"
    businessRole:
      key: sales_manager
      label: "Sales Manager"
      description: "Leads the commercial team across CRM, quotes, and approvals"
    permissions: ["quote.read", "quote.create", "quote.edit_draft", "quote.submit", "quote.approve", "quote.reject", "quote.accept", "quote.convert", "workflow.approval.decide", "product_service.read", "product_service.create", "product_service.update", "product_service.delete", "price_book.read", "price_book.create", "price_book.update", "price_book.delete", "price_book_item.read", "price_book_item.create", "price_book_item.update", "price_book_item.delete"]
  - key: workspace_administrator
    label: "Workspace Administrator"
    description: "Full access to all sales operations"
    permissions: ["*"]

defaultTemplate: small-business-sales-quote

# Pack-specific terminology overlay (v0.2.3).
# Sales Quote labels the shared "company" object as "Customer" for
# commercial proposal context, without forking the underlying object definition.
terminology:
  - object: company
    label: Customer
    navigationLabel: Customer
    route: /companies
  - object: deal
    label: Opportunity
    navigationLabel: Opportunity
    route: /deals

# Sales Quote workbench — focuses on commercial proposals, approvals, and value.
dashboard:
  defaultLayout:
    - zone: metrics
      widgets:
        - { module: runory.quote,            widget: open_quotes_metric,            instance: default }
        - { module: runory.quote,            widget: pending_approvals_metric,      instance: default }
        - { module: runory.product-service,  widget: active_products_metric,        instance: default }

    - zone: trends
      widgets:
        - { module: runory.quote, widget: new_quotes_trend, instance: default }

    - zone: lists
      widgets:
        - { module: runory.quote,           widget: quotes_needing_approval_list,  instance: default }
        - { module: runory.quote,           widget: recently_accepted_quotes_list, instance: default }
        - { module: runory.quote,           widget: expiring_quotes_list,          instance: default }

    - zone: activity
      widgets:
        - { module: _platform, widget: business_activity_feed, instance: default }

marketplace:
  category: sales
  license: runory_official
  publisher: runory
